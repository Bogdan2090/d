<!DOCTYPE html>
<html lang="ro" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ExamPro · Istorie IX</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;0,900;1,500;1,700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}

/* ── LIGHT THEME ── */
:root {
  --ink:#1a1612;--ink2:#3d3530;--ink3:#6b5f58;--ink4:#9e938d;
  --paper:#faf8f4;--paper2:#f3f0ea;--paper3:#ede8df;--paper4:#e4ddd2;
  --red:#c0392b;--red2:#e74c3c;--red-pale:#fdf2f1;
  --blue:#1a6b9e;--blue2:#2980b9;--blue-pale:#f0f7fc;
  --green:#27855a;--green2:#2ecc71;--green-pale:#f0faf5;
  --gold:#b8860b;--gold2:#d4a017;--gold-pale:#fdfbf0;
  --border:#ddd5c8;--border2:#c8bfb5;
  --radius:12px;--radius2:8px;
  --sw:264px;
  --shadow:0 1px 3px rgba(26,22,18,.07),0 4px 16px rgba(26,22,18,.05);
  --shadow2:0 4px 12px rgba(26,22,18,.1),0 16px 48px rgba(26,22,18,.08);
  --shadow3:0 8px 24px rgba(26,22,18,.12),0 24px 64px rgba(26,22,18,.1);
  --sb-bg:#141210;
  --sb-border:rgba(255,255,255,.06);
  --card-bg:#ffffff;
  --overlay:rgba(20,18,16,.6);
  --input-bg:#ffffff;
  --loader-bg:#faf8f4;
}

/* ── DARK THEME ── */
[data-theme="dark"] {
  --ink:#ece8e2;--ink2:#cfc9c1;--ink3:#9a928a;--ink4:#635d56;
  --paper:#0f0e0c;--paper2:#181613;--paper3:#201d1a;--paper4:#272320;
  --red:#e05446;--red2:#f06050;--red-pale:rgba(224,84,70,.1);
  --blue:#4a9dcc;--blue2:#5eb3e0;--blue-pale:rgba(74,157,204,.1);
  --green:#3aaf78;--green2:#4cc584;--green-pale:rgba(58,175,120,.1);
  --gold:#d4a017;--gold2:#e0b030;--gold-pale:rgba(212,160,23,.1);
  --border:#282420;--border2:#333028;
  --sb-bg:#090807;
  --sb-border:rgba(255,255,255,.05);
  --card-bg:#181613;
  --shadow:0 1px 3px rgba(0,0,0,.3),0 4px 16px rgba(0,0,0,.2);
  --shadow2:0 4px 12px rgba(0,0,0,.4),0 16px 48px rgba(0,0,0,.3);
  --shadow3:0 8px 24px rgba(0,0,0,.5),0 24px 64px rgba(0,0,0,.4);
  --overlay:rgba(0,0,0,.75);
  --input-bg:#1f1c18;
  --loader-bg:#0f0e0c;
}

html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased;transition:background .3s,color .3s}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}
::-webkit-scrollbar-thumb:hover{background:var(--ink4)}

/* ═══ LAYOUT ═══ */
.layout{display:flex;min-height:100vh}
.sidebar{width:var(--sw);background:var(--sb-bg);color:#e8e0d8;position:fixed;height:100vh;overflow-y:auto;display:flex;flex-direction:column;z-index:100;transition:transform .3s cubic-bezier(.4,0,.2,1);border-right:1px solid var(--sb-border)}
.main{flex:1;margin-left:var(--sw);min-width:0}
.burger{display:none;position:fixed;top:14px;left:14px;z-index:200;background:var(--sb-bg);border:none;border-radius:10px;width:42px;height:42px;align-items:center;justify-content:center;cursor:pointer;color:#fff;font-size:17px;box-shadow:var(--shadow2)}
.overlay{display:none;position:fixed;inset:0;background:var(--overlay);z-index:99;backdrop-filter:blur(2px)}
.overlay.open{display:block}

/* ═══ SIDEBAR ═══ */
.s-brand{padding:22px 20px 16px;border-bottom:1px solid var(--sb-border);display:flex;align-items:center;justify-content:space-between}
.s-brand-left{display:flex;flex-direction:column}
.s-logo{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:#fff;letter-spacing:-.3px}
.s-sub{font-size:10px;color:rgba(255,255,255,.28);letter-spacing:1px;margin-top:2px;text-transform:uppercase;font-weight:500}
.theme-toggle{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:8px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:rgba(255,255,255,.5);font-size:15px;transition:all .2s;flex-shrink:0}
.theme-toggle:hover{background:rgba(255,255,255,.12);color:rgba(255,255,255,.85);transform:scale(1.05)}
.s-student{padding:13px 20px;border-bottom:1px solid var(--sb-border);display:flex;align-items:center;gap:10px}
.s-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--red),#e74c3c);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0;font-family:'Playfair Display',serif;box-shadow:0 2px 8px rgba(192,57,43,.35)}
.s-name{font-size:12.5px;color:rgba(255,255,255,.62);font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.s-xp-wrap{padding:12px 20px;border-bottom:1px solid var(--sb-border)}
.s-xp-row{display:flex;justify-content:space-between;font-size:10px;color:rgba(255,255,255,.28);margin-bottom:5px;letter-spacing:.2px}
.s-xp-bar{height:3px;background:rgba(255,255,255,.08);border-radius:99px;overflow:hidden}
.s-xp-fill{height:100%;background:linear-gradient(90deg,var(--red),#e74c3c);border-radius:99px;transition:width .6s cubic-bezier(.4,0,.2,1)}
nav{flex:1;padding:8px 0 4px}
.nav-sec{font-size:9px;color:rgba(255,255,255,.2);letter-spacing:1.8px;text-transform:uppercase;padding:14px 20px 4px;font-weight:600}
.nb{display:flex;align-items:center;gap:9px;width:100%;padding:9px 20px 9px 18px;background:none;border:none;color:rgba(255,255,255,.44);font-size:12.5px;font-weight:400;cursor:pointer;text-align:left;font-family:'DM Sans',sans-serif;transition:all .15s;position:relative;letter-spacing:.1px;border-left:2px solid transparent}
.nb:hover{color:rgba(255,255,255,.8);background:rgba(255,255,255,.04);border-left-color:rgba(255,255,255,.08)}
.nb.active{color:#fff;background:rgba(255,255,255,.07);border-left-color:var(--red)}
.nb-ico{font-size:13px;width:18px;text-align:center;flex-shrink:0;opacity:.6}
.nb.active .nb-ico{opacity:1}
.nb-badge{background:var(--red);color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:99px;margin-left:auto;font-family:'DM Mono',monospace;letter-spacing:.2px}
.s-footer{padding:14px 20px;border-top:1px solid var(--sb-border)}
.s-streak{font-size:11px;color:rgba(255,255,255,.35);display:flex;align-items:center;gap:5px}
.s-streak strong{color:rgba(255,255,255,.62)}
.s-daily{margin-top:9px}
.s-daily-row{display:flex;justify-content:space-between;font-size:10px;color:rgba(255,255,255,.26);margin-bottom:4px}
.s-daily-bar{height:3px;background:rgba(255,255,255,.07);border-radius:99px;overflow:hidden}
.s-daily-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:99px;transition:width .5s}

/* ═══ PAGE ═══ */
.page-wrap{max-width:840px;margin:0 auto;padding:38px 28px}
.page{display:none}
.page.active{display:block;animation:fadeUp .28s cubic-bezier(.4,0,.2,1)}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.ph{margin-bottom:28px;padding-bottom:22px;border-bottom:1px solid var(--border)}
.ph-eye{font-size:10px;letter-spacing:1.8px;text-transform:uppercase;color:var(--ink4);margin-bottom:5px;font-weight:600}
.ph-title{font-family:'Playfair Display',serif;font-size:30px;font-weight:700;color:var(--ink);line-height:1.15;letter-spacing:-.4px}
.ph-desc{font-size:13.5px;color:var(--ink3);margin-top:5px;line-height:1.6}

/* ═══ CARDS ═══ */
.card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);transition:border-color .2s}
.card-red{border-left:3px solid var(--red)}
.card-blue{border-left:3px solid var(--blue)}
.card-green{border-left:3px solid var(--green)}
.card-gold{border-left:3px solid var(--gold)}
.sc{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);transition:all .2s}
.sc:hover{box-shadow:var(--shadow2);transform:translateY(-1px)}
.sc-ico{font-size:20px;margin-bottom:7px}
.sc-val{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;line-height:1;margin-bottom:2px}
.sc-lbl{font-size:10px;color:var(--ink4);text-transform:uppercase;letter-spacing:.8px;font-weight:600}

/* ═══ GRID ═══ */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}

/* ═══ PROGRESS ═══ */
.pb{height:5px;background:var(--paper3);border-radius:99px;overflow:hidden}
.pb-fill{height:100%;border-radius:99px;transition:width .6s cubic-bezier(.4,0,.2,1)}

/* ═══ TAGS ═══ */
.tag{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:6px;font-size:10.5px;font-weight:600;letter-spacing:.2px}
.t-red{background:var(--red-pale);color:var(--red);border:1px solid rgba(192,57,43,.18)}
.t-blue{background:var(--blue-pale);color:var(--blue);border:1px solid rgba(26,107,158,.18)}
.t-green{background:var(--green-pale);color:var(--green);border:1px solid rgba(39,133,90,.18)}
.t-gold{background:var(--gold-pale);color:var(--gold);border:1px solid rgba(184,134,11,.18)}
.t-ink{background:var(--paper3);color:var(--ink3);border:1px solid var(--border)}

/* ═══ BUTTONS ═══ */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 19px;border-radius:var(--radius2);border:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .16s;letter-spacing:.1px;line-height:1}
.btn:disabled{opacity:.38;cursor:not-allowed;transform:none!important;box-shadow:none!important}
.btn-primary{background:var(--ink);color:var(--paper)}
.btn-primary:hover:not(:disabled){background:var(--ink2);transform:translateY(-1px);box-shadow:0 4px 14px rgba(26,22,18,.22)}
.btn-red{background:var(--red);color:#fff}
.btn-red:hover:not(:disabled){background:var(--red2);transform:translateY(-1px);box-shadow:0 4px 14px rgba(192,57,43,.32)}
.btn-blue{background:var(--blue);color:#fff}
.btn-blue:hover:not(:disabled){background:var(--blue2);transform:translateY(-1px);box-shadow:0 4px 14px rgba(26,107,158,.3)}
.btn-green{background:var(--green);color:#fff}
.btn-green:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 4px 14px rgba(39,133,90,.3)}
.btn-outline{background:transparent;color:var(--ink2);border:1px solid var(--border2)}
.btn-outline:hover:not(:disabled){background:var(--paper2);border-color:var(--ink4)}
.btn-ghost{background:transparent;color:var(--ink3);border:none;padding:8px 13px}
.btn-ghost:hover:not(:disabled){color:var(--ink);background:var(--paper2)}
.btn-sm{padding:6px 13px;font-size:12px;border-radius:6px}
.btn-lg{padding:12px 26px;font-size:14px;border-radius:10px}

/* ═══ INPUTS ═══ */
.inp{background:var(--input-bg);border:1px solid var(--border);border-radius:var(--radius2);color:var(--ink);font-family:'DM Sans',sans-serif;font-size:13.5px;padding:9px 12px;outline:none;width:100%;transition:border-color .16s,box-shadow .16s}
.inp:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,107,158,.1)}
.inp::placeholder{color:var(--ink4)}
textarea.inp{resize:vertical;min-height:95px;line-height:1.65}
select.inp{cursor:pointer}

/* ═══ SECTION TITLE ═══ */
.divider{height:1px;background:var(--border);margin:18px 0}
.sec-t{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink4);font-weight:600;margin-bottom:13px;display:flex;align-items:center;gap:9px}
.sec-t::after{content:'';flex:1;height:1px;background:var(--border)}

/* ═══ AI RESULT ═══ */
.ai-loading{display:flex;align-items:center;gap:10px;padding:13px 15px;background:var(--blue-pale);border:1px solid rgba(26,107,158,.15);border-radius:var(--radius2);font-size:13px;color:var(--blue)}
.ai-res{border-radius:var(--radius);padding:17px;border:1px solid}
.ai-res.good{background:var(--green-pale);border-color:rgba(39,133,90,.2)}
.ai-res.partial{background:var(--gold-pale);border-color:rgba(184,134,11,.2)}
.ai-res.bad{background:var(--red-pale);border-color:rgba(192,57,43,.2)}
.ai-score-row{display:flex;align-items:center;gap:13px;margin-bottom:11px}
.ai-score-num{font-family:'Playfair Display',serif;font-size:38px;font-weight:700;line-height:1}
.ai-verdict{font-size:9.5px;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;margin-bottom:2px}
.ai-feedback{font-size:13px;color:var(--ink2);line-height:1.65}
.ai-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:11px}
.ai-box{background:rgba(255,255,255,.06);border-radius:var(--radius2);padding:10px}
[data-theme="light"] .ai-box{background:rgba(255,255,255,.6)}
.ai-box-lbl{font-size:9px;letter-spacing:.8px;text-transform:uppercase;font-weight:600;margin-bottom:4px;opacity:.65}
.ai-box-txt{font-size:12px;line-height:1.55;color:var(--ink2)}
.ans-model{background:var(--green-pale);border:1px solid rgba(39,133,90,.15);border-radius:var(--radius2);padding:13px;font-size:13px;line-height:1.75;color:var(--ink2)}
.ans-model-lbl{font-size:9px;letter-spacing:.8px;text-transform:uppercase;font-weight:600;color:var(--green);margin-bottom:7px}
.src-box{background:var(--blue-pale);border-left:3px solid var(--blue);border-radius:0 var(--radius2) var(--radius2) 0;padding:10px 13px;margin:10px 0;font-size:12.5px;color:var(--ink3);line-height:1.7;font-style:italic}
.hint-box{background:var(--gold-pale);border-left:3px solid var(--gold);border-radius:0 var(--radius2) var(--radius2) 0;padding:9px 12px;font-size:12.5px;color:var(--ink2);line-height:1.65}
.note-box{background:var(--gold-pale);border:1px solid rgba(184,134,11,.15);border-radius:var(--radius2);padding:11px}
.note-box textarea{background:transparent;border:none;outline:none;width:100%;color:var(--ink2);font-family:'DM Sans',sans-serif;font-size:12.5px;resize:none;line-height:1.65}

/* ═══ FLASHCARD ═══ */
.fc-wrap{perspective:1200px;width:100%;height:260px;cursor:pointer;margin:0 auto 18px}
.fc{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .55s cubic-bezier(.4,0,.2,1)}
.fc.flipped{transform:rotateY(180deg)}
.fc-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:var(--radius);padding:28px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;border:1px solid var(--border)}
.fc-front{background:var(--card-bg);box-shadow:var(--shadow2)}
.fc-back{background:var(--green-pale);box-shadow:var(--shadow2);transform:rotateY(180deg);border-color:rgba(39,133,90,.2)}
.fc-hint{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--ink4);margin-bottom:13px;font-weight:600}
.fc-q{font-size:15px;font-weight:500;line-height:1.65;color:var(--ink)}

/* ═══ QUIZ OPTIONS ═══ */
.opt{display:flex;align-items:flex-start;gap:11px;width:100%;text-align:left;padding:12px 14px;background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius2);color:var(--ink);font-family:'DM Sans',sans-serif;font-size:13px;margin-bottom:8px;cursor:pointer;transition:all .15s;line-height:1.55}
.opt:hover:not(:disabled){border-color:var(--blue);background:var(--blue-pale)}
.opt.correct{border-color:var(--green)!important;background:var(--green-pale)!important}
.opt.wrong{border-color:var(--red)!important;background:var(--red-pale)!important}
.opt:disabled{cursor:default}
.opt-letter{width:24px;height:24px;border:1.5px solid var(--border2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0;color:var(--ink4);font-family:'DM Mono',monospace;margin-top:1px}
.opt.correct .opt-letter{background:var(--green);color:#fff;border-color:var(--green)}
.opt.wrong .opt-letter{background:var(--red);color:#fff;border-color:var(--red)}

/* ═══ GAME CARD ═══ */
.gc{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:22px 18px;text-align:center;cursor:pointer;transition:all .2s;box-shadow:var(--shadow)}
.gc:hover{transform:translateY(-4px);box-shadow:var(--shadow3);border-color:var(--border2)}
.gc-ico{font-size:36px;margin-bottom:11px;display:block;transition:transform .25s}
.gc:hover .gc-ico{transform:scale(1.12)}
.gc-title{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;margin-bottom:4px;color:var(--ink)}
.gc-desc{font-size:11.5px;color:var(--ink4);line-height:1.55}

/* ═══ TOGGLE ═══ */
.toggle{position:relative;width:42px;height:22px;cursor:pointer;flex-shrink:0;display:inline-block}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.toggle-track{position:absolute;inset:0;background:var(--paper3);border-radius:22px;transition:background .18s;border:1px solid var(--border)}
.toggle input:checked+.toggle-track{background:var(--green);border-color:var(--green)}
.toggle-thumb{position:absolute;width:16px;height:16px;background:#fff;border-radius:50%;top:2px;left:2px;transition:left .18s;box-shadow:0 1px 4px rgba(0,0,0,.2);pointer-events:none}
.toggle input:checked~.toggle-thumb{left:22px}

/* ═══ POMODORO ═══ */
.pomo-ring{position:relative;width:180px;height:180px;margin:0 auto 18px}
.pomo-svg{transform:rotate(-90deg)}
.pomo-track{fill:none;stroke:var(--paper3);stroke-width:7}
.pomo-prog{fill:none;stroke-width:7;stroke-linecap:round;transition:stroke-dashoffset .8s ease}
.pomo-time{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.pomo-t{font-family:'Playfair Display',serif;font-size:32px;font-weight:700;letter-spacing:-1px}
.pomo-lbl{font-size:9.5px;color:var(--ink4);letter-spacing:1px;text-transform:uppercase;margin-top:3px;font-weight:600}

/* ═══ HANGMAN ═══ */
.hm-word{font-family:'DM Mono',monospace;font-size:26px;letter-spacing:10px;text-align:center;color:var(--ink);margin:16px 0}
.hm-keys{display:flex;flex-wrap:wrap;gap:5px;justify-content:center}
.hm-key{width:34px;height:34px;border-radius:7px;border:1px solid var(--border);background:var(--card-bg);color:var(--ink);font-family:'DM Mono',monospace;font-size:11px;font-weight:500;cursor:pointer;transition:all .14s}
.hm-key:hover:not(:disabled){border-color:var(--blue);background:var(--blue-pale);color:var(--blue)}
.hm-key.hit{background:var(--green-pale);border-color:rgba(39,133,90,.3);color:var(--green)}
.hm-key.miss{background:var(--red-pale);border-color:rgba(192,57,43,.2);color:var(--red);opacity:.55}
.hm-key:disabled{cursor:default}

/* ═══ TIMELINE ═══ */
.tl-wrap{position:relative;padding-left:26px}
.tl-wrap::before{content:'';position:absolute;left:6px;top:8px;bottom:8px;width:2px;background:var(--border);border-radius:99px}
.tl-item{position:relative;margin-bottom:18px}
.tl-dot{position:absolute;left:-22px;top:8px;width:10px;height:10px;border-radius:50%;background:var(--red);border:2px solid var(--paper);box-shadow:0 0 0 2px var(--border2)}
.tl-year{font-family:'DM Mono',monospace;font-size:10.5px;color:var(--red);font-weight:500;margin-bottom:2px;letter-spacing:.4px}
.tl-ev{font-size:13.5px;font-weight:600;color:var(--ink);margin-bottom:2px;line-height:1.4}
.tl-desc{font-size:12px;color:var(--ink3);line-height:1.6}

/* ═══ ACHIEVEMENT ═══ */
.ach-row{display:flex;gap:13px;align-items:center;padding:12px 14px;border:1px solid var(--border);border-radius:var(--radius);background:var(--card-bg);margin-bottom:8px;transition:all .18s;box-shadow:var(--shadow)}
.ach-row.unlocked{border-color:rgba(184,134,11,.3);background:var(--gold-pale)}
.ach-row.unlocked:hover{transform:translateY(-2px);box-shadow:var(--shadow2)}

/* ═══ EXAM IMAGES ═══ */
.ei-card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:all .2s;box-shadow:var(--shadow)}
.ei-card:hover{transform:translateY(-4px);box-shadow:var(--shadow3);border-color:var(--border2)}
.ei-prev{height:110px;background:var(--paper2);display:flex;align-items:center;justify-content:center;gap:7px;font-size:28px;border-bottom:1px solid var(--border)}
.ei-inner{padding:13px}
.ev-overlay{position:fixed;inset:0;z-index:5000;background:var(--paper);display:flex;flex-direction:column;overflow-y:auto}
.ev-hdr{position:sticky;top:0;padding:15px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:rgba(var(--paper),.95);backdrop-filter:blur(10px);z-index:10}

/* ═══ MATCH ═══ */
.match-col button{width:100%;text-align:left;padding:10px 13px;border:1px solid var(--border);border-radius:var(--radius2);background:var(--card-bg);color:var(--ink2);font-family:'DM Sans',sans-serif;font-size:12.5px;margin-bottom:7px;cursor:pointer;transition:all .16s;line-height:1.5}
.match-col button:hover:not(:disabled){border-color:var(--blue);background:var(--blue-pale)}
.match-col button.sel{border-color:var(--red);background:var(--red-pale);color:var(--red)}
.match-col button.done{border-color:rgba(39,133,90,.3);background:var(--green-pale);color:var(--green);cursor:default}

/* ═══ SORT ═══ */
.sort-item{display:flex;align-items:center;gap:9px;padding:10px 12px;background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius2);margin-bottom:7px;transition:all .13s}
.sort-item:hover{border-color:var(--border2);box-shadow:var(--shadow)}
.sort-btn{background:var(--paper2);border:1px solid var(--border);border-radius:5px;color:var(--ink4);font-size:11px;width:26px;height:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .13s}
.sort-btn:hover:not(:disabled){background:var(--paper3);color:var(--ink)}
.sort-btn:disabled{opacity:.25;cursor:default}

/* ═══ TOAST ═══ */
.toast-wrap{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--ink);color:var(--paper);border-radius:10px;padding:10px 16px;font-size:12.5px;font-weight:500;box-shadow:var(--shadow3);max-width:270px;animation:toastIn .28s cubic-bezier(.4,0,.2,1);display:flex;align-items:center;gap:8px;border-left:3px solid}
@keyframes toastIn{from{opacity:0;transform:translateY(12px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}

/* ═══ SPINNER ═══ */
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(26,107,158,.2);border-top-color:var(--blue);border-radius:50%;animation:spin .65s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* ═══ CHATBOT ═══ */
#chat-fab{position:fixed;bottom:24px;right:24px;z-index:8000;width:50px;height:50px;border-radius:50%;background:var(--sb-bg);border:1px solid rgba(255,255,255,.1);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:var(--shadow3);transition:all .2s}
#chat-fab:hover{transform:scale(1.08);box-shadow:0 8px 24px rgba(0,0,0,.3)}
#chat-win{position:fixed;bottom:86px;right:24px;z-index:7999;width:350px;max-width:calc(100vw - 30px);height:500px;max-height:calc(100vh - 120px);background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);display:flex;flex-direction:column;box-shadow:var(--shadow3);transform:scale(.92) translateY(16px);opacity:0;transition:all .26s cubic-bezier(.4,0,.2,1);pointer-events:none;overflow:hidden}
#chat-win.open{transform:scale(1) translateY(0);opacity:1;pointer-events:all}
.ch-hdr{padding:13px 15px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:var(--paper2)}
.ch-title{font-size:12.5px;font-weight:600;color:var(--ink)}
.ch-close{background:none;border:none;color:var(--ink4);cursor:pointer;font-size:16px;padding:3px 7px;border-radius:6px;transition:all .13s}
.ch-close:hover{background:var(--paper3);color:var(--ink)}
.ch-msgs{flex:1;overflow-y:auto;padding:13px;display:flex;flex-direction:column;gap:9px}
.ch-msg{max-width:88%;padding:9px 13px;border-radius:10px;font-size:12.5px;line-height:1.6}
.ch-msg.user{background:var(--ink);color:var(--paper);align-self:flex-end;border-radius:10px 10px 3px 10px}
.ch-msg.ai{background:var(--paper2);color:var(--ink);align-self:flex-start;border-radius:10px 10px 10px 3px;border:1px solid var(--border)}
.ch-inp-row{padding:10px;border-top:1px solid var(--border);display:flex;gap:7px}
.ch-inp{flex:1;background:var(--paper2);border:1px solid var(--border);border-radius:8px;color:var(--ink);font-family:'DM Sans',sans-serif;font-size:12.5px;padding:8px 10px;outline:none;resize:none;transition:border-color .15s;line-height:1.4}
.ch-inp:focus{border-color:var(--blue);background:var(--input-bg)}
.ch-send{background:var(--ink);border:none;border-radius:8px;color:var(--paper);width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .13s;flex-shrink:0;align-self:flex-end}
.ch-send:hover:not(:disabled){background:var(--red)}
.ch-send:disabled{opacity:.3;cursor:not-allowed}

/* ═══ WELCOME ═══ */
.welcome-hero{padding:52px 0 42px;text-align:center}
.welcome-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;background:var(--red-pale);border:1px solid rgba(192,57,43,.15);border-radius:99px;font-size:11px;font-weight:600;color:var(--red);letter-spacing:.2px;margin-bottom:20px}
.welcome-title{font-family:'Playfair Display',serif;font-size:48px;font-weight:900;line-height:1.05;letter-spacing:-1.8px;color:var(--ink);margin-bottom:13px}
.welcome-title em{font-style:italic;color:var(--red)}
.welcome-sub{font-size:16px;color:var(--ink3);line-height:1.7;max-width:500px;margin:0 auto 34px}
.welcome-stats{display:flex;justify-content:center;gap:40px;padding:20px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin-bottom:36px;flex-wrap:wrap}
.ws-n{font-family:'Playfair Display',serif;font-size:34px;font-weight:700;color:var(--ink);line-height:1}
.ws-l{font-size:10.5px;color:var(--ink4);text-transform:uppercase;letter-spacing:.7px;margin-top:3px;font-weight:600}
.welcome-feats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;text-align:left;margin-top:32px}
.wf{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);transition:all .22s}
.wf:hover{transform:translateY(-3px);box-shadow:var(--shadow2);border-color:var(--border2)}
.wf-ico{font-size:22px;margin-bottom:9px}
.wf-t{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:3px}
.wf-d{font-size:11.5px;color:var(--ink4);line-height:1.55}

/* ═══ SETTINGS ROW ═══ */
.set-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border)}
.set-row:last-child{border-bottom:none}
.bm-btn{background:none;border:none;cursor:pointer;font-size:16px;color:var(--ink4);transition:all .15s;padding:3px;line-height:1;border-radius:5px}
.bm-btn:hover{transform:scale(1.2);background:var(--paper2)}
.bm-btn.on{color:var(--gold)}

/* ═══ EXAM BUTTONS ═══ */
.qnav-btn{width:30px;height:30px;border-radius:6px;border:1px solid var(--border);background:var(--card-bg);color:var(--ink3);font-size:10.5px;font-weight:600;cursor:pointer;transition:all .13s;font-family:'DM Mono',monospace}
.qnav-btn.active{background:var(--red);border-color:var(--red);color:#fff}
.qnav-btn.answered{background:var(--green-pale);border-color:rgba(39,133,90,.3);color:var(--green)}
.exam-timer{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;letter-spacing:-1px}

/* ═══ LOADER ═══ */
#loader{position:fixed;inset:0;background:var(--loader-bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .5s,visibility .5s}
#loader.out{opacity:0;visibility:hidden;pointer-events:none}
.ld-logo{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;color:var(--ink);margin-bottom:4px}
.ld-sub{font-size:10.5px;color:var(--ink4);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:28px}
.ld-bar{width:180px;height:2px;background:var(--paper3);border-radius:99px;overflow:hidden}
.ld-fill{height:100%;background:var(--red);border-radius:99px;animation:ldB 1.2s ease-in-out infinite}
@keyframes ldB{0%{width:0;margin-left:0}50%{width:60%}100%{width:0;margin-left:100%}}

/* ═══ SHORTCUTS PANEL ═══ */
.kbs-overlay{position:fixed;inset:0;z-index:6000;background:var(--overlay);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.kbs-panel{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:24px;width:380px;max-width:90vw;box-shadow:var(--shadow3)}
.kbs-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.kbs-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:12.5px;color:var(--ink3)}
.kbs-row:last-child{border-bottom:none}
.kbs-key{background:var(--paper2);border:1px solid var(--border2);border-radius:5px;padding:2px 8px;font-family:'DM Mono',monospace;font-size:11px;color:var(--ink);font-weight:600}

/* ═══ SEARCH BAR ═══ */
.top-bar{display:flex;align-items:center;gap:10px;padding:12px 28px;border-bottom:1px solid var(--border);background:var(--card-bg);position:sticky;top:0;z-index:50;backdrop-filter:blur(8px)}
.top-bar-search{flex:1;max-width:380px;position:relative}
.top-bar-search input{background:var(--paper2);border:1px solid var(--border);border-radius:8px;color:var(--ink);font-family:'DM Sans',sans-serif;font-size:13px;padding:7px 12px 7px 34px;outline:none;width:100%;transition:all .2s}
.top-bar-search input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,107,158,.08);background:var(--input-bg)}
.top-bar-search::before{content:"🔍";position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;pointer-events:none;z-index:1}
.top-bar-actions{display:flex;gap:6px;margin-left:auto}
.top-bar-btn{background:var(--paper2);border:1px solid var(--border);border-radius:8px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink3);font-size:14px;transition:all .15s}
.top-bar-btn:hover{background:var(--paper3);color:var(--ink)}
.search-results{position:absolute;top:calc(100% + 5px);left:0;right:0;background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius2);box-shadow:var(--shadow3);max-height:320px;overflow-y:auto;z-index:1000}
.search-item{padding:10px 13px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .1s}
.search-item:last-child{border-bottom:none}
.search-item:hover{background:var(--paper2)}
.search-item-q{font-size:12.5px;font-weight:500;color:var(--ink);margin-bottom:2px;line-height:1.4}
.search-item-meta{font-size:10.5px;color:var(--ink4)}

@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}
  .main{margin-left:0;padding-top:56px}.burger{display:flex}
  .g4{grid-template-columns:1fr 1fr}.g3{grid-template-columns:1fr 1fr}.g2{grid-template-columns:1fr}
  .welcome-title{font-size:32px}.welcome-feats{grid-template-columns:1fr}.page-wrap{padding:20px 16px}
  #chat-win{width:calc(100vw - 24px);right:12px}.ai-grid{grid-template-columns:1fr}
  .top-bar{padding:10px 16px}.top-bar-search{max-width:100%}
}
@media(max-width:480px){.g3,.g4{grid-template-columns:1fr}.ph-title{font-size:24px}.welcome-title{font-size:26px}}

/* ═══ PDF LIST ═══ */
.pdf-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px}
.pdf-card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);transition:all .2s}
.pdf-card:hover{transform:translateY(-3px);box-shadow:var(--shadow3);border-color:var(--blue2)}
.pdf-prev{height:110px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;border-bottom:1px solid var(--border);background:linear-gradient(135deg,var(--paper2),var(--paper3))}
.pdf-inner{padding:12px}
</style>
</head>
<body>
<div id="loader"><div class="ld-logo">ExamPro</div><div class="ld-sub">Istorie · Clasa IX · Moldova</div><div class="ld-bar"><div class="ld-fill"></div></div></div>

<div class="layout">
<aside class="sidebar" id="sidebar">
  <div class="s-brand">
    <div class="s-brand-left">
      <div class="s-logo">ExamPro</div>
      <div class="s-sub">Istorie IX · Moldova</div>
    </div>
    <button class="theme-toggle" id="theme-btn" onclick="toggleTheme()" title="Comută tema (T)">🌙</button>
  </div>
  <div class="s-student"><div class="s-avatar" id="s-av">E</div><div class="s-name" id="s-nm">Elev</div></div>
  <div class="s-xp-wrap">
    <div class="s-xp-row"><span id="s-lv">Nivel 1</span><span id="s-xp-txt">0 / 200 XP</span></div>
    <div class="s-xp-bar"><div class="s-xp-fill" id="s-xp-fill" style="width:0%"></div></div>
  </div>
  <nav id="nav-menu"></nav>
  <div class="s-footer">
    <div class="s-streak">🔥 <span>Consecutiv:</span> <strong id="s-streak">0 zile</strong></div>
    <div class="s-daily">
      <div class="s-daily-row"><span>Obiectiv zi</span><span id="s-daily-txt">0/10</span></div>
      <div class="s-daily-bar"><div class="s-daily-fill" id="s-daily-fill" style="width:0%"></div></div>
    </div>
  </div>
</aside>

<button class="burger" id="burger" onclick="toggleSidebar()">☰</button>
<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<main class="main">
  <div class="top-bar">
    <div class="top-bar-search">
      <input type="text" id="search-inp" placeholder="Caută o întrebare..." oninput="handleSearch(this.value)" onblur="setTimeout(()=>closeSearch(),200)">
      <div class="search-results" id="search-results" style="display:none"></div>
    </div>
    <div class="top-bar-actions">
      <button class="top-bar-btn" onclick="showShortcuts()" title="Scurtături tastatură">⌨️</button>
      <button class="top-bar-btn" onclick="goPage('stats')" title="Statistici">📊</button>
    </div>
  </div>
  <div id="pg-welcome"      class="page active"><div class="page-wrap"></div></div>
  <div id="pg-dashboard"   class="page"><div class="page-wrap"></div></div>
  <div id="pg-practice"    class="page"><div class="page-wrap"></div></div>
  <div id="pg-flashcards"  class="page"><div class="page-wrap"></div></div>
  <div id="pg-exam"        class="page"><div class="page-wrap"></div></div>
  <div id="pg-examimages"  class="page"><div class="page-wrap"></div></div>
  <div id="pg-review"      class="page"><div class="page-wrap"></div></div>
  <div id="pg-timeline"    class="page"><div class="page-wrap"></div></div>
  <div id="pg-games"       class="page"><div class="page-wrap"></div></div>
  <div id="pg-pomodoro"    class="page"><div class="page-wrap"></div></div>
  <div id="pg-pdfs"        class="page"><div class="page-wrap"></div></div>
  <div id="pg-stats"       class="page"><div class="page-wrap"></div></div>
  <div id="pg-achievements"class="page"><div class="page-wrap"></div></div>
  <div id="pg-settings"    class="page"><div class="page-wrap"></div></div>
  <div id="pg-learn"        class="page"><div class="page-wrap"></div></div>
</main>

<!-- MINI TIMER WIDGET -->
<div id="mini-timer" style="position:fixed;top:12px;right:12px;z-index:6000;background:var(--card-bg);border:1px solid var(--border);border-radius:12px;padding:8px 12px;display:flex;align-items:center;gap:8px;box-shadow:var(--shadow2);font-size:12px;cursor:pointer;user-select:none;transition:all .2s" title="Click pentru a configura timerul">
  <span id="mt-ico" style="font-size:15px">⏱️</span>
  <span id="mt-display" style="font-family:'DM Mono',monospace;font-weight:600;color:var(--ink);letter-spacing:.5px">00:00</span>
  <button id="mt-btn" onclick="mtToggle()" style="background:var(--paper2);border:1px solid var(--border);border-radius:6px;width:22px;height:22px;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;padding:0;color:var(--ink3)">▶</button>
  <button onclick="mtOpen()" style="background:none;border:none;cursor:pointer;font-size:11px;color:var(--ink4);padding:0 2px" title="Setează">⚙</button>
</div>

<!-- TIMER CONFIG MODAL -->
<div id="mt-modal" style="display:none;position:fixed;inset:0;z-index:6500;background:var(--overlay);backdrop-filter:blur(4px);align-items:center;justify-content:center">
  <div style="background:var(--card-bg);border:1px solid var(--border);border-radius:16px;padding:28px;width:320px;box-shadow:var(--shadow3)">
    <div style="font-family:'Playfair Display',serif;font-size:18px;font-weight:700;margin-bottom:16px">⏱️ Setează Timerul</div>
    <div style="margin-bottom:12px">
      <div style="font-size:11px;color:var(--ink4);text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:6px">Minute</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-outline btn-sm" onclick="mtSet(5)">5min</button>
        <button class="btn btn-outline btn-sm" onclick="mtSet(10)">10min</button>
        <button class="btn btn-outline btn-sm" onclick="mtSet(15)">15min</button>
        <button class="btn btn-outline btn-sm" onclick="mtSet(20)">20min</button>
        <button class="btn btn-outline btn-sm" onclick="mtSet(25)">25min</button>
        <button class="btn btn-outline btn-sm" onclick="mtSet(30)">30min</button>
        <button class="btn btn-outline btn-sm" onclick="mtSet(45)">45min</button>
        <button class="btn btn-outline btn-sm" onclick="mtSet(60)">60min</button>
        <button class="btn btn-outline btn-sm" onclick="mtSet(90)">90min</button>
        <button class="btn btn-outline btn-sm" onclick="mtSet(120)">120min</button>
      </div>
    </div>
    <div style="margin-bottom:16px">
      <div style="font-size:11px;color:var(--ink4);text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:6px">Custom (minute)</div>
      <div style="display:flex;gap:8px">
        <input type="number" id="mt-custom" class="inp" placeholder="e.g. 120" min="1" max="300" style="flex:1">
        <button class="btn btn-primary btn-sm" onclick="mtSetCustom()">OK</button>
      </div>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn btn-outline btn-sm" onclick="mtReset()">Reset</button>
      <button class="btn btn-primary btn-sm" onclick="mtCloseModal()">Închide</button>
    </div>
  </div>
</div>
</div>

<div class="toast-wrap" id="toasts"></div>
<button id="chat-fab" onclick="toggleChat()" title="Tutore AI (C)">🤖</button>
<div id="chat-win">
  <div class="ch-hdr"><div class="ch-title">🤖 Tutore AI · Istorie IX</div><button class="ch-close" onclick="toggleChat()">✕</button></div>
  <div class="ch-msgs" id="ch-msgs"></div>
  <div class="ch-inp-row">
    <textarea class="ch-inp" id="ch-inp" placeholder="Întreabă orice..." rows="1" onkeydown="chatKey(event)"></textarea>
    <button class="ch-send" id="ch-send" onclick="sendChat()">↑</button>
  </div>
</div>

<script>const LEARN_CHAPTERS=[
  {
    id:"wwi",ico:"\u2694\ufe0f",
    title:"Primul Război Mondial și Formarea Statului Național Român",
    subtitles:["T1 · Lumea la cumpăna sec. XIX–XX. Primul Război Mondial (1914–1918)", "T2 · România în Primul Război Mondial", "T3 · Mișcarea națională a românilor din Basarabia (1917–1918)", "T4 · Formarea Statului Național Unitar Român. Marea Unire 1918", "T5 · Conferința de Pace de la Paris și noua ordine internațională"],
    content:[
      `<p style="margin-bottom:8px">Confruntarea intereselor Marilor Puteri europene, grupate în două blocuri militare – Antanta și Tripla Alianță –, a condus la Primul Război Mondial. Războiul a fost unul de durată, cu consecințe dezastruoase: circa 10 milioane de morți și peste 21 milioane de răniți. Războiul încheiat cu victoria Antantei a dus la dezintegrarea Imperiului German, Imperiului Austro-Ungar, Imperiului Rus și Imperiului Otoman și la apariția unor noi state independente.</p>
<p style="margin-bottom:8px">Alianță – înțelegere politică între state, pe bază de tratat, prin care se obligă să acționeze în comun sau să se ajute în anumite imprejurări. Război mondial – luptă armată la care participă numeroase state ale lumii. Ultimatum – înștiințare făcută de un stat altui stat, prin notă diplomatică, în care i se atrage atenția că, în cazul în care ar săvârși anumite acte, se vor lua măsuri de constrângere sau se va porni război împotriva lui.</p>
<p style="margin-bottom:8px">Mecanismul declanșării Primului Război Mondial în anul <strong>1914</strong> 28 iunie – asasinarea la Sarajevo a arhiducelui Austriei, Franz Ferdinand, și a soției lui, Sofia, de către studentul sârb Gavrilo Princip.</p>`,
      `<p style="margin-bottom:8px">Deși a semnat o alianță defensivă cu Puterile Centrale în <strong>1883</strong>, România a decis să declare neutralitatea în anul <strong>1914</strong>. Sub presiunea Marilor Puteri, dar reieșind și din interesele naționale, la 15/28 august <strong>1916</strong> România a intrat în război de partea Antantei. În lunile iulie-august <strong>1917</strong> armata română a repurtat victorii importante, dar din cauza atacului din trei direcții, a Loviturii de stat bolșevice din Rusia și pierderii aliatului, statul român a fost nevoit să semneze armistițiu, apoi pacea cu Puterile Centrale. Către sfârșitul conflagrației România a reintrat în război, aflându-se în tabăra învingătoare.</p>
<p style="margin-bottom:8px">Monumentul Eroilor Neamului căzuți în Primul Război Mondial, inaugurat la 22 octombrie <strong>2022</strong> în satul Fundurii Vechi, raionul Glodeni. Monumentul a fost ridicat la inițiativa AO „Monumentum” și cu implicarea comunității locale. (https://infoprut.ro/) Apreciază importanța păstrării memoriei eroilor căzuți în luptă. Exprimă-ți opinia privind implicarea civică a cetățenilor și organizațiilor obștești în promovarea istoriei și valorilor neamului.</p>`,
      `<p style="margin-bottom:8px">Studiind această temă, vei cunoaște etapele mișcării naționale a românilor din Basarabia și din teritoriile din stânga Nistrului și vei aprecia contribuția diferitelor personalități în lupta pentru autodeterminare națională.</p>
<p style="margin-bottom:8px">Mișcarea națională a românilor din Basarabia și din teritoriile din stânga Nistrului, în fruntea căreia s-au situat intelectualii și militarii basarabeni, s-a desfășurat în condițiile prăbușirii monarhiei în Imperiul Rus, ale pretențiilor teritoriale din partea Ucrainei și ale instaurării regimului sovietic.</p>
<p style="margin-bottom:8px">PORTRET ISTORIC Elena Alistar (<strong>1873</strong>–<strong>1956</strong>), medic, membră a Partidului Național Moldovenesc, unica femeie deputat în Sfatul Țării care a votat Unirea. Militantă pentru unirea Basarabiei cu România. A fondat Liga Culturală a Femeilor din Basarabia. A fost președintă a Partidului Poporului. Directoare a Școlii Eparhiale de Fete din Chișinău. Promotoare a portului popular. Elaborează o prezentare PPT despre Elena Alistar.</p>
<p style="margin-bottom:8px">Mișcarea națională a românilor din Basarabia până în octombrie <strong>1917</strong>.</p>`,
      `<p style="margin-bottom:8px">Anul <strong>1918</strong> a reprezentat ora astrală a poporului român. În urma unui război cu numeroase jertfe și eforturi și a mișcării naționale a românilor din provinciile înstrăinate, s-a realizat unitatea națională. Românii din Basarabia, Bucovina, Transilvania, Banat și Maramureș au decis Unirea cu România.</p>
<p style="margin-bottom:8px">Congresul General al Bucovinei – organ reprezentativ din Bucovina care a votat unirea cu România. Dreptul popoarelor la autodeterminare – dreptul popoarelor de a-și hotărî soarta. Marea Adunare Națională (din Transilvania) – adunare reprezentativă a populației cu rol de organ reprezentativ legislativ.</p>
<p style="margin-bottom:8px">Legendă: – Teritoriul României la 1 decembrie <strong>1918</strong> – Hotarul României după 1 decembrie <strong>1918</strong> 27.03.18 – Votarea de către adunări reprezentative a Unirii cu România BUCUREȘTI – Capitala României</p>
<p style="margin-bottom:8px">27 martie /9 aprilie <strong>1918</strong> – votarea de către Sfatul Țării a Declarației de Unire a Basarabiei cu România</p>
<p style="margin-bottom:8px">PORTRET ISTORIC Ferdinand I, rege al României (10 octombrie <strong>1914</strong>– 20 iulie <strong>1927</strong>).</p>`,
      `<p style="margin-bottom:8px">Prin sistemul de tratate semnate la Conferința de Pace de la Paris și la Conferința de la Washington, numit și Sistemul Versailles– Washington, s-a stabilit o nouă ordine internațională și s-au pus bazele relațiilor interbelice din Europa.</p>
<p style="margin-bottom:8px">Cei Patru Mari (Consiliul celor patru) – Georges Clemenceau, prim-ministrul francez, Lloyd George, primministrul britanic, Woodrow Wilson, președintele SUA, și Vittorio Orlando, prim-ministrul italian. Cele 14 puncte ale lui Wilson – plan prezentat de președintele SUA la 8 ianuarie <strong>1918</strong> în fața Senatului, în care se pleda pentru dreptul popoarelor la autodeterminare, aplicarea principiului naționalităților și crearea unei „Ligi a națiunilor”. Demilitarizare – interdicția de staționare a forțelor armate și de ridicare a fortificațiilor și instalațiilor militare pe un teritoriu conform tratatelor internaționale. Reparații de război – compensarea, financiară sau în natură, de către statele învinse, a pagubelor provocate altor state în timpul războiului.</p>`,
    ]

  {
    id:"interbelic",ico:"\ud83c\udfdb\ufe0f",
    title:"Lumea în Perioada Interbelică",
    subtitles:["T6 · Statele Unite ale Americii", "T7 · Statele Europei de Vest: Marea Britanie, Franța", "T8 · Statele Europei de Vest: Germania, Italia, Spania", "T9 · Statele Europei Centrale și de Est", "T10 · Rusia/Uniunea Sovietică", "T11 · Extremul Orient", "T12 · România în perioada interbelică", "T13 · Basarabia în cadrul României Mari (1918–1940)", "T14 · RASSM (1924–1940) și politica expansionistă a URSS", "T15 · Cultura și știința în perioada interbelică", "T16 · Cultura românească în 1918–1940"],
    content:[
      `<p style="margin-bottom:8px">După Primul Război Mondial, Statele Unite au devenit cea mai prosperă țară din lume. Au cunoscut o rapidă dezvoltare economică, ajungând la o criză de supraproducție, depășită prin programul New-Deal.</p>
<p style="margin-bottom:8px">Concern – reunire de mai multe întreprinderi din diferite ramuri economice sub conducerea unui grup restrâns de monopoliști, diferită de trust prin aceea că întreprinderile rămân formal independente. Crah – fenomen economic caracterizat prin lipsa acută a creditului pe piață, scăderea catastrofală a cursului acțiunilor la bursă și devalorizarea monedei. Izolaționism – politică externă a unei țări de neimplicare în soluționarea problemelor internaționale. Legea Prohibiției – prin Amendamentul XVIII al Constituției, în <strong>1919</strong>, în SUA s-a interzis producerea, vânzarea, exportul băuturilor alcoolice. Republică prezidențială – formă de guvernământ în care președintele este atât șeful statului, cât și șeful Executivului, fiind ales de popor. Trust – formă de monopol în care întreprinderile care s-au contopit își pierd independența comercială, de producție și juridică.</p>`,
      `<p style="margin-bottom:8px">Marea Britanie, deși s-a confruntat cu numeroase probleme interne, prin sistemul democratic tradițional a asigurat o creștere lentă, dar sigură, depășind stagnarea din primii ani postbelici și recesiunea din timpul Marii Crize Economice. Franța, victorioasă, dar îndatorată, a cunoscut perioade lungi de instabilitate politică și frecvente schimbări de guverne. O anumită stabilitate economică a fost asigurată de teritoriile nou achiziționate și reparațiile primite, ceea ce a întârziat cu doi ani manifestarea Marii Crize Economice.</p>
<p style="margin-bottom:8px">Commonwealth (confederație, comunitate) – asociație liberă a Marii Britanii și a fostelor sale colonii devenite state independente, care îl recunosc pe suveranul britanic al legăturii lor și ca șef al Commonwealth-ului. Conferință Imperială – conferință a premierilor britanci cu reprezentanții coloniilor. Monarhie constituțională – formă de guvernare în frunte cu un monarh, atribuțiile căruia sunt limitate de o constituție.</p>`,
      `<p style="margin-bottom:8px">Studiind această temă, vei cunoaște caracteristicile regimurilor totalitare de extremă dreaptă (fasciste și naziste), procesul constituirii și consecințele lor asu pra societății, vei putea distinge manifestările extremiste specifice totalitarismului și lipsei de democrație și astfel vei înțelege mai bine necesitatea respectării drepturilor omului.</p>
<p style="margin-bottom:8px">În anii ´20, în Germania a triumfat democrația parlamentară. Însă fragilitatea democrației, prevederile impuse de Tratatul de la Versailles, consecințele Marii Depresiuni au dus la ascensiunea nazismului și instaurarea regimului totalitar (<strong>1933</strong>). Criza social-economică și politică după Primul Război Mondial a dus la consolidarea grupurilor fasciste și instaurarea dictaturii fasciste în Italia. Slăbiciunea democrației, lupta dintre grupările de extremă dreaptă și stângă au dus la declanșarea unui război civil (<strong>1936</strong>–<strong>1939</strong>) în Spania, încheiat cu victoria naționaliștilor.</p>
<p style="margin-bottom:8px">Anschluss – anexarea Austriei de către Germania în <strong>1938</strong>.</p>`,
      `<p style="margin-bottom:8px">Studiind această temă, vei înțelege cauzele instaurării regimurilor autoritare și specificul lor în țările Europei Centrale și de Est. Vei putea distinge manifestările democratice și nedemocratice în trecut și în prezent în viața politică din țara noastră și din alte țări.</p>
<p style="margin-bottom:8px">Țările Europei Centrale și de Est, beneficiind de prevederile tratatelor din sistemul Versailles, și-au constituit state naționale cu regimuri democratice, însă problemele social-economice, precum și imperfecțiunea regimurilor democratice au împins Ungaria, Polonia, Iugoslavia, Bulgaria și România spre regimuri autoritare. Cehoslovacia a devenit victimă a dictaturilor din statele vecine.</p>
<p style="margin-bottom:8px">Dictatură – regim politic în care societatea nu dispune de mecanisme capabile să controleze puterea politică și, prin urmare, un popor este condus forțat de către o persoană, un partid sau un grup de oameni. Lovitură de stat – acțiune rapidă urmărind răsturnarea regimului politic existent și preluarea, prin forță, a puterii politice de către grupuri de persoane.</p>`,
      `<p style="margin-bottom:8px">Bolșevic – adept al bolșevismului, al învățăturii lui Lenin, comunist. GULAG – Direcția generală a lagărelor (Glavnoe Upravlenie Lagherei), termen folosit pentru a denumi atât rețeaua de lagăre, cât și sistemul represiv. Proletariat – totalitatea muncitorilor, lipsiți de mijloace de producție. Represiune – utilizarea forței și violenței (reprimări, deportări, arestări ș.a.) pentru a controla un grup de populație. Soviete – în Rusia Sovietică, apoi URSS, organ al puterii de stat centrale și locale format din deputați „aleși de cetățeni” (în realitate desemnați de partidul de la conducere).</p>
<p style="margin-bottom:8px">Creșterea numărului republicilor unionale Anul</p>
<p style="margin-bottom:8px">RSFS Rusă, RSS Ucraineană, RSS Bielorusă, RSFS Transcaucaziană <strong>1922</strong> (RSS Armeană, RSS Azerbaidjană, RSS Gruzină)</p>
<p style="margin-bottom:8px">3 martie <strong>1918</strong> – semnarea Tratatului de pace de la Brest-Litovsk</p>
<p style="margin-bottom:8px"><strong>1918</strong>–<strong>1922</strong> – Războiul civil din Rusia <strong>1920</strong></p>`,
      `<p style="margin-bottom:8px">Deși în primul deceniu interbelic Japonia a cunoscut importante progrese pe calea democratizării, totuși, sub influența cercurilor militariste, a evoluat spre un regim autoritar cu politică expansionistă, dezlănțuind în <strong>1931</strong> un război de cucerire a Chinei. În perioada interbelică, China s-a confruntat cu un șir de războaie civile dintre naționaliști și comuniști, care, la acutizarea pericolului nipon, au semnat un armistițiu și au făcut front comun contra agresorului extern. Alianța s-a destrămat când Japonia a fost înfrântă, iar războiul civil a fost reluat.</p>
<p style="margin-bottom:8px">Militarism – politică de subordonare a activității de stat și prin aceasta a întregii vieți sociale, de mărire a potențialului militar și de pregătire pentru război, precum și de menținere cu aplicarea forței a relațiilor de dominație atât pe plan intern, cât și pe plan internațional. Colaboraționism – atitudine sau politică de trădare a intereselor propriei țări, specifică celor care au colaborat cu ocupanții străini.</p>`,
      `<p style="margin-bottom:8px">După Marea Unire, Regatul României a avut un regim democratic consfințit prin Constituția adoptată la <strong>1923</strong>. Din cauza crizelor sociale, economice și politice, dar și sub influență externă, Carol al II-lea a instaurat în <strong>1938</strong> regimul autoritar. În plan economic, social, administrativ au fost desfășurate reforme importante. În plan extern, diplomația a fost orientată spre recunoașterea internațională a Marii Uniri, dar și asigurarea securității și integrității țării.</p>
<p style="margin-bottom:8px">Dictat – act prin care un stat impune altui stat condiții împotriva voinței acestuia. Fuziune – contopire a două sau mai multe partide în unul singur. Regență – instituție provizorie în timpul minoratului, absenței sau lipsei monarhului. Reformă – transformare politică, economică, socială, culturală a unei stări de lucruri pentru a obține o ameliorare sau un progres; schimbare în sânul unei societăți (care nu modifică structura generală a acelei societăți).</p>
<p style="margin-bottom:8px">Marii Uniri, susținând-o cu două argumente, cu trimitere la hartă. 10 februarie <strong>1938</strong> – lovitura de stat a lui Carol al II-lea – instaurarea monarhiei autoritare</p>`,
      `<p style="margin-bottom:8px">După unirea Basarabiei cu România (<strong>1918</strong>) a urmat procesul de integrare în statul român. S-au realizat măsuri de modernizare a economiei, a vieții politice, a societății în ansamblu. Basarabia a cunoscut o dezvoltare multilaterală: economică, socială și culturală. Cu toate acestea, au existat și anumite limite legate de lipsa zăcămintelor, infrastructura insuficient dezvoltată etc. Oamenii politici din Basarabia s-au integrat în viața politică din România atât la nivel local, cât și național.</p>
<p style="margin-bottom:8px">„Casa Noastră” – instituție de stat cu sediul la Chișinău, care se ocupa cu organizarea și administrarea lucrărilor de expropriere și împroprietărire. Mișcarea cooperatistă – asociere, uniune de persoane în întreprinderi cooperatiste (de producție, de consum, de desfacere, de credit, prestări de servicii etc.).</p>
<p style="margin-bottom:8px">Participarea basarabenilor în viața politică a României. La 27 noiembrie <strong>1918</strong> a fost convocată ultima ședință a Sfatului Țării. Basarabenilor le-a fost rezervat un anumit număr de locuri în Adunarea Națională.</p>`,
      `<p style="margin-bottom:8px">URSS urmărea să recupereze fostele teritorii ale Imperiului Rus. Astfel, la frontiera estică a României a fost creată RASS Moldovenească, în care au fost implementate toate structurile totalitare sovietice, însoțite de foamete organizată, deportări și represiuni în masă. RASSM a fost creată cu intenția de a fi folosită în calitate de cap de pod pentru anexarea Basarabiei, dar și pentru expansiunea în Europa de Est.</p>
<p style="margin-bottom:8px">Colectivizare – acțiuni, întreprinse de puterea sovietică, de trecere a mijloacelor de producție în proprietate colectivă prin naționalizare, expropriere etc., procese deseori însoțite de violență, deportări, condamnări. Epurare – campanie de represiune din URSS ce presupunea identificarea și lichidarea „dușmanilor poporului”. Exod – emigrare în masă a populației. PC(b) – Partidul Comunist (bolșevic).</p>
<p style="margin-bottom:8px">Examinează simbolurile RASSM. Explică semnificația secerii și ciocanului. Studiază cu atenție harta. Stabilește hotarul de vest al RASSM. Harta RASSM 4 februarie <strong>1924</strong> – expedierea Memoriului cu privire la necesitatea creării RASSM</p>`,
      `<p style="margin-bottom:8px">Prima conflagrație mondială, revoluția bolșevică, fascismul și nazismul, criza economică din <strong>1929</strong>–<strong>1933</strong> au avut impact asupra culturii și artei. Aceste evenimente și fenomene au afectat, în special, mediile intelectuale și mai puțin masele largi, care își abandonează puțin câte puțin moștenirea culturală de origine rurală pentru o cultură a consumului și a divertismentului.</p>
<p style="margin-bottom:8px">Cultura de masă – o formă de cultură legată de societatea contemporană, adesea asociată cu societatea de consum, în care o mare parte din relațiile dintre oameni este bazată sau guvernată de procese economice și în care consumul și dorințele lor devin fenomene de societate. Dadaism – curent literar-artistic apărut în Europa în anul <strong>1916</strong>, inițiat de românul Tristan Tzara. Suprarealism – curent literar-artistic apărut în anii ΄20, în Franța, care pune accentul pe activitatea spontană a imaginației și pe exploatarea zonelor iraționalului în creația artistică.</p>
<p style="margin-bottom:8px">„Portretul unei femei din Rat Mort”, de Maurice de Vlaminck</p>`,
      `<p style="margin-bottom:8px">Întregirea statului român, consolidarea regimului democratic, reformele economice au stimulat dezvoltarea culturii românești, care a cunoscut o perioadă de ascendență în toate domeniile: învățământ, știință, arte, literatură.</p>
<p style="margin-bottom:8px">Avangardism – curent artistic caracterizat prin negarea violentă a formelor de artă consacrate. Artiștii se concentrează asupra creației ca proces, neinteresându-se de rezultatul ei. Modernism – curent sau tendință din arta și literatura sec. XX care neagă tradiția și susține principii de creație noi. Tradiționalism – tendință excesivă spre folclor, istorie etc., care se opune modernismului și respinge ideea de civilizație; supraevaluare a tradiției.</p>
<p style="margin-bottom:8px">După constituirea statului național unitar, afirmarea României s-a reflectat în plan cultural prin deschiderea spre cultura europeană, fără a nega valoarea specificului național.</p>`,
    ]

  {
    id:"rel_int",ico:"\ud83c\udf10",
    title:"Relațiile Internaționale în Perioada Interbelică",
    subtitles:["T17 · Alianțe și tratate politico-militare în perioada interbelică", "T18 · Relațiile sovieto-române între 1918 și 1940", "T19 · Pactul Ribbentrop-Molotov și consecințele lui", "T20 · Pierderile teritoriale ale României în vara anului 1940", "T21 · Formarea RSSM și instaurarea regimului comunist"],
    content:[
      `<p style="margin-bottom:8px">După semnarea tratatelor Sistemului Versai lles-Washin gton și constituirea unei noi ordini internaționale, statele lumii au depus eforturi pentru a evita o viitoare agresiune, a renunța la război ca mijloc de realizare a politicii externe și a crea un sistem de securitate colectivă. Deși au fost semnate un șir de tratate internaționale, marile puteri europene tindeau să-și realizeze propriile scopuri pe plan extern, în defavoarea altor state.</p>
<p style="margin-bottom:8px">Alianță – înțelegere politică între două sau mai multe state prin care se obligă să acționeze în comun sau să se ajute în anumite împrejurări (război, atac îndreptat de alte state împotriva unuia dintre statele aliate). Anticomintern – alianță militară îndreptată împotriva comunismului internațional încheiată între Germania și Japonia (<strong>1936</strong>) și la care au aderat ulterior și alte state. Pact – înțelegere (scrisă), tratat internațional, bilateral sau multilateral, încheiat în special în scopul menținerii păcii sau al colaborării semnatarilor.</p>`,
      `<p style="margin-bottom:8px">În această temă vei cunoaște și înțelege cauzele divergențelor diplomatice dintre România și URSS, care, în contextul relațiilor internaționale din anii ΄30–40 ai secolului XX, s-au sfârșit cu ruperea relațiilor diplomatice și anexarea Basarabiei, nordului Bucovinei și ținutului Herța.</p>
<p style="margin-bottom:8px">Deși Guvernul sovietic a proclamat dreptul popoarelor la autodeterminare, Rusia Sovietică n-a recunoscut Declarația de unire a Basarabiei cu România din 27 Martie <strong>1918</strong> și nici Tratatul de la Paris din <strong>1920</strong>, care recunoștea realizarea Marii Uniri în plan internațional. Relațiile sovieto-române pe parcursul perioadei interbelice au fost tensionate, o anumită ameliorare înregistrându-se între <strong>1934</strong> și <strong>1936</strong>. Punerea în aplicare a Protocolului adițional secret al Pactului Ribbentrop-Molotov a dus, în <strong>1940</strong>, la anexarea Basarabiei de URSS.</p>
<p style="margin-bottom:8px">Integritate teritorială – principiu de bază al dreptului internațional potrivit căruia fiecare stat are dreptul să-și exercite deplin și nestingherit suveranitatea asupra teritoriului său.</p>`,
      `<p style="margin-bottom:8px">Competențele de analiză a tratatelor internaționale și a impactului acestora îți va permite să înțelegi un șir de fenomene și evenimente istorice, sociale, politice, culturale din Europa de Est din secolul XX, dar și din prezent, care au avut loc drept consecință a semnării Pactului Rib bentrop-Molotov.</p>
<p style="margin-bottom:8px">Prin semnarea Protocolului adițional secret al Pactului Ri bbentrop-Molotov, la 23 august <strong>1939</strong>, două state totalitare au împărțit Europa în sfere de influență, urmând consecințe tragice: declanșarea celui de-al Doilea Război Mondial, împărțirea Poloniei între Germania și Uniunea Sovietică, anexarea Basarabiei, nordului Bucovinei și ținutului Herța, a statelor baltice și a Kareliei de către URSS.</p>
<p style="margin-bottom:8px">Pact de neagresiune – tratat prin care două sau mai multe state se obligă să nu întreprindă nicio acțiune armată între ele. Protocol adițional secret – document cu valoarea unui acord internațional, semnat cu scopul completării unui tratat internațional cu prevederi și angajamente de împărțire a sferelor de influență și teritoriilor, care nu este prezentat opiniei publice, fiind ținut în secret.</p>`,
      `<p style="margin-bottom:8px">23. România, Basarabia și Transnistria în anii celui</p>
<p style="margin-bottom:8px">5. Lumea postbelică 26. Relațiile internaționale în perioada <strong>1945</strong>–<strong>1991</strong>. Constituirea și activitatea Organizației Națiunilor</p>
<p style="margin-bottom:8px">31. Foametea, represiunile și deportările staliniste</p>
<p style="margin-bottom:8px">33. Statele comuniste din Europa de Est și Asia</p>
<p style="margin-bottom:8px">6. Lumea la sfârșitul secolului XX – începutul secolului XXI 35. Criza sistemului totalitar și colapsul regimurilor</p>`,
      `<p style="margin-bottom:8px">Studiind această temă, vei cunoaște și înțelege particularitățile procesului de constituire a RSS Moldovenești și manifestările regimului totalitar în primul an de ocupație sovietică.</p>
<p style="margin-bottom:8px">În urma notelor ultimative din 26 și 27 iunie <strong>1940</strong>, drept consecință a Protocolului adițional secret al Pactului Ribbentrop-Molotov, la 28 iunie trupele sovietice au ocupat Basarabia, nordul Bucovinei și ținutul Herța. Teritoriul Basarabiei a fost sfârtecat: o parte a fost încorporat în Ucraina Sovietică, iar altă parte a fost „unită” cu RASSM, constituindu-se RSS Moldovenească, cu un regim sovietic totalitar.</p>
<p style="margin-bottom:8px">Impozit – plată obligatorie către stat, în bani sau în produse, stabilită prin lege. Represiune – represalii; reprimare prin violență a unei acțiuni de opoziție, acțiuni drastice (arestări, torturi, execuții în masă, deportări) întreprinse în acest scop.</p>
<p style="margin-bottom:8px">Stema RSS Moldovenești (<strong>1941</strong>, <strong>1944</strong>–<strong>1981</strong>)</p>
<p style="margin-bottom:8px">„Art. 122. Gherbu de stat a RSS Moldovenești constă din chipu sășerii și șiocanului în razele soarelui, care răsare, încadrate cu o cunună de schișe și popușoi.</p>`,

    content:[
      `<p style="margin-bottom:8px">Deficiențele Sistemului de Tratate de la Versailles, realitățile social-economice și politice din perioada interbelică din Germania, ascensiunea nazismului și eșecul sistemului de securitate colectivă au dus la declanșarea celui de-al Doilea Război Mondial. Prima etapă a războiului (<strong>1939</strong>– <strong>1943</strong>) s-a caracterizat prin victorii ale Germaniei și aliaților săi, instaurarea „ordinii naziste” în Europa, implicarea unui mare număr de state în război și crearea Coaliției antihitleriste. Preluarea inițiativei strategice de Coaliția antihitleristă în anul <strong>1943</strong>, prin victoriile de la Stalingrad, El-Alamein, Kursk etc., a marcat începutul șirului de înfrângeri ale naziștilor și aliaților lor, ce a dus la capitularea Germaniei (8–9 mai <strong>1945</strong>) și a Japoniei (2 septembrie <strong>1945</strong>). Soarta Europei și a Germaniei de după război a fost dezbătută în cadrul Conferințelor interaliate.</p>
<p style="margin-bottom:8px">Linia Maginot – sistem de fortificații construit de Franța de-a lungul graniței cu Germania (din Elveția pană la Luxemburg).</p>`,
      `<p style="margin-bottom:8px">23. România, Basarabia și Transnistria în anii celui de-al Doilea Război Mondial</p>
<p style="margin-bottom:8px">În <strong>1941</strong>, România a intrat în război, alături de Germania, cu scopul de a-și reîntoarce teritoriile pierdute. Basarabia, Bucovina și regiunea dintre Nistru și Bug (Transnistria) au fost puse sub administrație românească. Deși obiectivul final al războiului în ceea ce privește granița de est a statului fusese atins pentru România, s-a decis continuarea ofensivei dincolo de Nistru. La 23 august <strong>1944</strong>, România a întors armele contra Germaniei naziste și s-a aliat Coaliției antihitleriste.</p>
<p style="margin-bottom:8px">Dictatură – regim politic în care întreaga putere este deținută de o persoană sau un grup de persoane, într-o manieră autoritară, arbitrară, recurgându-se la forță și coerciție. Statul Național-Legionar – denumirea purtată de Regatul României între 14 septembrie <strong>1940</strong> și 14 februarie <strong>1941</strong>. Regimul s-a caracterizat prin autoritarism, naționalism radical și antisemitism.</p>
<p style="margin-bottom:8px">Române în calitate de aliat al Germaniei. Armata Română în calitate de aliat al Națiunilor Unite.</p>`,
      `<p style="margin-bottom:8px">Crimele de război săvârșite de Puterile Axei au fost judecate de către un Tribunal Militar Internațional. Printre cele mai grave crime s-a numărat Holocaustul, inclusiv pe teritoriul României, soldat cu numeroase victime din rândul evreilor și romilor. Crimele de război comise de membrii Coaliției antihitleriste au fost condamnate de instituțiile mondiale mult mai târziu.</p>
<p style="margin-bottom:8px">Crime de război – încălcări deosebit de grave ale dreptului internațional umanitar în timpul desfășurării acțiunilor militare, manifestate prin: uciderea, torturarea civililor, a prizonierilor de război, organizarea sclaviei asupra prizonierilor de război și civililor capturați în zonele de luptă; capturarea și uciderea ostaticilor; distrugerea nejustificată a infrastructurii civile; distrugerea locuințelor și așezărilor fără destinație militară. Crime împotriva umanității – crime cu caracter de masă, cu un număr mare de victime, care, din cauza gravității extreme, nu au un termen de prescripție. Holocaust – 1) exterminarea (prin diferite metode) a unei mari părți a populației evreiești, rome, poloneze etc.</p>`,
      `<p style="margin-bottom:8px">Spre sfârșitul războiului Europa era distrusă și demoralizată, cuprinsă de crize demografice, sociale și economice. O popularitate largă obțineau partidele comuniste, care, susținute de prezența Armatei Roșii „eliberatoare”, au instaurat în unele țări din Europa Centrală și de Est regimuri comuniste după modelul sovietic.</p>
<p style="margin-bottom:8px">Absenteism (în contextul istoric al anilor postbelici) – lipsa de la locurile de muncă, renunțarea sau neparticiparea la îndeplinirea obligațiilor de familie în condițiile crizei sociale acute din anii postbelici, când fiecare individ era preocupat de supraviețuirea personală, generând alte consecințe social-economice și adâncirea crizei.</p>
<p style="margin-bottom:8px">Împărțirea Germaniei în zone de ocupație</p>
<p style="margin-bottom:8px">Germania în zone de ocupație. Copii jucându-se printre ruinele unei case din cartierul Favoriten, Viena</p>
<p style="margin-bottom:8px">Al Doilea Război Mondial a durat 2 174 de zile și a cauzat omenirii pierderi umane și distrugeri de o amploare fără precedent în istorie: 60 de mil. de oameni au murit – aproximativ 25 de mil. de ostași și circa 35 de mil. de civili.</p>`,

    content:[
      `<p style="margin-bottom:8px">Organizației Națiunilor Unite Studiind această temă, vei înțelege esența relațiilor internaționale în perioada postbelică, vei cunoaște cauzele, desfășurarea și consecințele războiului rece și vei aprecia importanța Organizației Națiunilor Unite (ONU).</p>
<p style="margin-bottom:8px">Confruntarea dintre URSS, în fruntea statelor comuniste, și SUA, în fruntea statelor democratice, denumită și războiul rece, a culminat cu pericolul unui război nuclear (<strong>1962</strong>). Situația s-a ameliorat după aplicarea de către URSS a „noii mentalități politice”, ceea ce a dus la sfârșitul războiului rece. Cel de-al Doilea Război Mondial a mobilizat comunitatea internațională în vederea creării unui mecanism viabil de menținere a păcii și securității în lume, astfel că în <strong>1945</strong> a fost constituită Organizația Națiunilor Unite (ONU) și principalele ei instituții.</p>
<p style="margin-bottom:8px">Cartă – act care stă la baza organizării și funcționării unei organizații internaționale. Cortina de fier – denumirea dată de W. Churchill împărțirii Europei în două: Occidentul liber și Estul ocupat și comunizat de sovietici.</p>`,
      `<p style="margin-bottom:8px">După ce vei studia această temă, vei cunoaște și înțelege factorii care au influențat evoluția postbelică a SUA, a Franței, a Angliei și vei aprecia importanța investițiilor statului în educație și cercetare.</p>
<p style="margin-bottom:8px">Statele Unite au devenit cele mai puternice din lume din punct de vedere economic. Guvernele s-au orientat spre crearea „statului bunăstării generale”. Franța a rezolvat cu succes problemele interne, iar în politica externă a militat pentru legături de alianță atât cu URSS, cât și cu Marea Britanie și SUA. Marea Britanie, prin reformele promovate, a reușit să depășeacă problemele economice și s-a plasat pe poziții dominante în politica mondială.</p>
<p style="margin-bottom:8px">Brexit – retragerea Marii Britanii din Uniunea Europeană, începută în <strong>2017</strong> și încheiată în <strong>2020</strong>. Companie transnațională – entitate economică formată dintr-o companie-mamă și una stabilită într-o anumită țară în conformitate cu legislația locală. Politică de „containment” – politica de atenuare a expansiunii comunismului.</p>`,
      `<p style="margin-bottom:8px">Germania a fost scindată în două state cu sisteme politice diferite: democratic în Vest și socialist în Est. În perioada postbelică RFG a fost un exemplu de trecere de la totalitarism la democrație și de creștere economică deosebită. Italia, constituită în republică democratică, a dispus de un sistem politic multipartidist și a cunoscut un miracol economic. Japonia, după o perioadă de ocupație americană, în urma aplicării reformelor a cunoscut o dezvoltare economică efervescentă.</p>
<p style="margin-bottom:8px">Helmut Kohl (n. <strong>1930</strong>), politician creștin-democrat german, cancelar al RFG din <strong>1982</strong> până în <strong>1998</strong>. European convins, a reînnodat legăturile preferențiale cu Franța. După căderea regimului comunist în RDG, a realizat procesul de unificare a celor două Germanii și în <strong>1990</strong> a devenit primul cancelar al Germaniei unite. Apreciază prin două argumente importanța personalității în istorie.</p>
<p style="margin-bottom:8px">OPINII „Trebuie să fim permanent conștienți de faptul că Germania și poporul german nu sunt încă liberi, că nu stă în același rând pe picior de egalitate cu alte popoare libere, că el [poporul german – n.n.</p>`,
      `<p style="margin-bottom:8px">În perioada postbelică, în contextul războiului rece, URSS s-a preocupat mai mult de consolidarea poziției internaționale decât de satisfacerea nevoilor populației. O revigorare ușoară din perioada dezghețului hrușciovist a fost urmată de stagnare. „Perestroika” a culminat cu destrămarea URSS.</p>
<p style="margin-bottom:8px">Socialism – sistem de organizare socială în care proprietatea privată și diviziunea veniturilor sunt supuse controlului societății. Puci – lovitură de stat violentă, provocată de un grup de complotiști nesusținuți de mase. Nouă gândire politică – concept propus de M. Gorbaciov, care prevedea că statul sovietic trebuia să-și revizuiască obiectivele în domeniul politicii externe, care nu trebuie dusă prin prisma factorului ideologic. Disident – persoană care nu este de acord cu un regim politic aflat la putere. Gerontocrație – sistem de guvernare în care puterea politică sau conducerea aparține bătrânilor.</p>
<p style="margin-bottom:8px">RSS Letonă RSS Estonă RSS Lituaniană RSS Bielorusă</p>
<p style="margin-bottom:8px">Mihail Gorbaciov (<strong>1931</strong>–<strong>2022</strong>), secretar general al PC al URSS din <strong>1985</strong>, a inițiat perestroika și glasnost.</p>`,
      `<p style="margin-bottom:8px">Odată cu restabilirea puterii sovietice în RSSM, în anul <strong>1944</strong>, a început transformarea societății basarabene în una sovietică, după modelul URSS. Sovietizarea satelor și colectivizarea gospodăriilor țărănești au schimbat economia agrară și imaginea satului basarabean, având impact radical asupra modului de viață al populației din Basarabia.</p>
<p style="margin-bottom:8px">Compară simbolurile de stat ale RSSM cu cele ale RASSM. Identifică asemănările și deosebirile.</p>
<p style="margin-bottom:8px">Viața politică în RSSM. Odată cu înaintarea Armatei Roșii și desfășurarea operațiilor militare, în Basarabia a fost reinstaurat regimul sovietic totalitar. În martie-august <strong>1944</strong> centrul autorităților sovietice a fost orașul Soroca, iar după operația Iași-Chișinău toate organele centrale ale puterii de stat au fost transferate la Chișinău. Prin articolul 4 al Convenției de armistițiu, semnată la 12 septembrie <strong>1944</strong> între URSS și Romania, au fost reconfirmate frontierele de stat fixate în vara anului <strong>1940</strong> și a fost restabilită RSSM.</p>`,
      `<p style="margin-bottom:8px">Foametea, represiunile și deportările staliniste 33. Statele comuniste din Europa de Est și Asia 6. Lumea la sfârșitul secolului XX – începutul secolului XXI 35. Criza sistemului totalitar și colapsul regimurilor 36. RSSM între <strong>1985</strong> și <strong>1991</strong>. 40. Integrarea Europeană. Uniunea Europeană 7. Cultura și știința în perioada postbelică 41. Cultura și știința universală în Epoca Contemporană. 43. Evoluția culturii în Republica Moldova.</p>

      `<p style="margin-bottom:8px">Populația din RSSM, nemulțumită de acțiunile autorităților și politica sovietică promovată în republică, a desfășurat o largă mișcare anticomunistă, reprezentată în diverse forme, inclusiv rezistență armată.</p>

<p style="margin-bottom:8px">DOCUMENTAR „[...] pe lângă metodele active de luptă cu organele Puterii Sovietice și agitația dușmănoasă antisovietică provocatoare, culăcimea desfășoară o activitate de subminare a colhozurilor și opune o rezistență înverșunată transformării socialiste a satului. [...] Prin agitație anticolhoznică, prin instigări la neprezentare în masă la lucru, prin delapidarea și jefuirea averii colhoznice, sabotarea livrărilor către stat și nerespectarea statutului artelului agricol, elementele culăcești dușmănoase discreditează ideea construcției colhoznice, dezorganizează și distrug colhozurile, împiedică intrarea țăranilor săraci în colhozuri, frânează dezvoltarea ulterioară a colectivizării agriculturii.” Memoriul lui F.</p>`,
      `<p style="margin-bottom:8px">Statele comuniste din Europa de Est și Asia 6. Lumea la sfârșitul secolului XX – începutul secolului XXI 35. Criza sistemului totalitar și colapsul regimurilor 36. RSSM între <strong>1985</strong> și <strong>1991</strong>. 40. Integrarea Europeană. Uniunea Europeană 7. Cultura și știința în perioada postbelică 41. Cultura și știința universală în Epoca Contemporană. 43. Evoluția culturii în Republica Moldova.</p>

      `<p style="margin-bottom:8px">Regimul politic instaurat în România în perioada postbelică a fost unul totalitar, de inspirație sovietică.</p>
<p style="margin-bottom:8px">Cultul personalității – exaltarea rolului unei personalități politice în dezvoltarea societății, în cadrul unui regim totalitar. Proletcultism – atitudine și politică față de problemele artei și culturii în URSS și țările lagărului socialist, care respingea întreaga moștenire culturală a trecutului, susținând că ea nu este utilă poporului, și propaga ideea creării unei culturi „pur proletare”.</p>
<p style="margin-bottom:8px">Analizează simbolurile de stat ale României postbelice. Explică semnificația elementelor simbolurilor de stat.</p>
<p style="margin-bottom:8px">Instaurarea regimului comunist în România. Armata Roșie, intrată pe teritoriul României în iulie <strong>1944</strong>, a susținut Partidul Comunist Român (PCR) în acțiunea sa de preluare a puterii politice. În perioada septembrie <strong>1944</strong>–martie <strong>1945</strong> România a fost condusă de guverne de coaliție, în frunte cu generalii Constantin Sănătescu și Nicolae Rădescu, în care au fost incluși și reprezentanți ai PCR.</p>`,
