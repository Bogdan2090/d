      `<p style="margin-bottom:8px">Proclamarea independenței Republicii Moldova Studiind această temă, vei înțelege premisele și procesul de revenire la valorile culturii și istoriei naționale, precum și ale proclamării independenței Republicii Moldova.</p>
<p style="margin-bottom:8px">Revenirea la valorile culturii naționale, constituirea și activitatea organizațiilor culturale și politice în contextul restructurării inițiate de Gorbaciov au culminat în RSS Moldovenească cu Marile Adunări Naționale din <strong>1989</strong> și <strong>1991</strong> (adoptarea limbii române (numită moldovenească) drept limbă de stat, revenirea la alfabetul latin) și proclamarea independenței Republicii Moldova.</p>
<p style="margin-bottom:8px">Cenaclu – reunire periodică a unui grup de scriitori, artiști, oameni de cultură, intelectuali. Independență – situație a unui stat sau a unui popor care se bucură de suveranitate națională; stare de neatârnare și drept de a rezolva liber (cu respectarea drepturilor altor state și a principiilor dreptului internațional) problemele sale interne și externe, fără amestec din afară. Suveranitate – calitatea statului de a dispune liber de soarta sa.</p>`,
      `<p style="margin-bottom:8px">Războiul de pe Nistru a fost declanșat de separatiștii transnistreni, cu susținerea Armatei a 14-a ruse, ca reacție la mișcarea de eliberare națională din RSSM, la proclamarea limbii române în calitate de limbă de stat. În fapt, conflictul a fost declanșat de forțele proruse din regiunea din stânga Nistrului pentru a menține controlul politic și economic asupra Republicii Moldova și a nu permite desprinderea definitivă a țării noastre de fostele republici sovietice și ieșirea de sub influența Rusiei. După câteva luni de confruntări armate, focul a fost încetat, iar în stânga Nistrului a rămas instalat un regim ilegal prorus, teritoriul autoproclamatei „rmn” nefiind controlat de autoritățile constituționale ale Republicii Moldova. Astfel, războiul a luat forma unui conflict înghețat.</p>
<p style="margin-bottom:8px">Separatism – tendință spre separare; mișcare a unei minorități naționale pentru a forma un stat independent sau o regiune autonomă în cadrul unui stat. Conflict înghețat – conflict armat a cărui soluționare este stopată de anumiți factori pe o perioadă lungă de timp, fără operațiuni militare.</p>`,
      `<p style="margin-bottom:8px">Studiind această temă, vei înțelege procesul de democratizare a Republicii Moldova, particularitățile și dificultățile perioadei de tranziție. De asemenea, vei fi capabil să distingi forțele politice, personalitățile care au contribuit la dezvoltarea țării.</p>
<p style="margin-bottom:8px">Incepând cu anul <strong>1991</strong>, Republica Moldova a parcurs o perioadă complicată de tranziție de la sistemul politic totalitar la democrație, de la economia planificată la economia de piață, cunoscând importante succese în afirmarea pluralismului politic, dar n-a depășit definitiv reminiscențele societăților nedemocratice, sărăcia, corupția, iar integritatea țării este subminată. Acordarea, în <strong>2022</strong>, Republicii Moldova a statutului de candidat la aderarea la Uniunea Europeană oferă perspective mai clare și o susținere mai mare în promovarea reformelor.</p>
<p style="margin-bottom:8px">Bon patrimonial – hârtie de valoare nominativă de stat care s-a eliberat cetățenilor Republicii Moldova și care le acorda dreptul de a procura o parte din bunurile de stat în cadrul reformei de privatizare contra bonurilor patrimoniale.</p>`,
      `<p style="margin-bottom:8px">După Revoluția din <strong>1989</strong> România a parcurs o etapă dificilă de tranziție, de democratizare, de trecere la economia de piață. Deși s-a confruntat cu numeroase dificultăți, statul român a reușit să înfăptuiască reforme în domeniul vieții politice, economice și sociale. Lupta cu corupția a constituit o prioritate, succesele căreia a permis României să devină mai credibilă pe plan european. România a reușit să adere la NATO (<strong>2004</strong>) și Uniunea Europeană (<strong>2007</strong>).</p>
<p style="margin-bottom:8px">Perioadă de tranziție – perioada de trecere de la regimul totalitar comunist la democrație, de la economia de comandă la cea de piață, specifică țărilor din Europa Centrală și de Est, care au fost parte a lagărului socialist sau a Uniunii Sovietice.</p>
<p style="margin-bottom:8px">În decembrie <strong>1989</strong>, populația României s-a revoltat împotriva regimului de dictatură a lui Nicolae Ceaușescu și a manifestat pentru libertate și democrație. Printre primele măsuri ale Frontului Salvării Naționale, constituit în seara zilei de 22 decembrie <strong>1989</strong>, s-a înscris și legiferarea pluralismului politic.</p>`,
      `<p style="margin-bottom:8px">Brexit – retragerea Marii Britanii din Uniunea Europeană, începută în <strong>2017</strong> și încheiată în <strong>2020</strong>. Companie transnațională – entitate economică formată dintr-o companie-mamă și una stabilită într-o anumită țară în conformitate cu legislația locală. Politică de „containment” – politica de atenuare a expansiunii comunismului. Statul bunăstării generale – model în care statul joacă un rol-cheie în protecția și promovarea economică și bunăstarea socială a cetățenilor săi, pe principiile egalității de șanse și distribuția echitabilă a bogăției. Thatcherism – ansamblul ideilor, acțiunilor și politicilor promovate de Margaret Thatcher.</p>

      `<p style="margin-bottom:8px">43. Evoluția culturii în Republica Moldova.</p>
<p style="margin-bottom:8px">Introducere în studierea istoriei românilor și universale (Epoca Contemporană) Studiind această temă, vei înțelege ce este istoria contemporană, vei deveni motivat/ă și dornic/ă să studiezi această epocă istorică, care determină prezentul și viitorul societății.</p>
<p style="margin-bottom:8px">Epoca Contemporană este o perioadă din istoria umanității, istoria recentă a noastră, a părinților și bunicilor noștri, a societăților și țărilor lumii din <strong>1914</strong> până în prezent.</p>
<p style="margin-bottom:8px">Istorie contemporană – domeniu de studiu al istoriei universale, știință care studiază trecutul generațiilor care mai sunt în viață. Generație – totalitatea oamenilor (dintr-o comunitate socială dată) care sunt cam de aceeași vârstă; perioadă care desparte vârsta tatălui de cea a fiului.</p>
<p style="margin-bottom:8px">Istoria contemporană studiază cea mai recentă epocă din istoria umanității – istoria a trei-patru generații care mai sunt în viață: generația tânără, părinții, bunicii și străbunicii. Cronologic, patru generații care conviețuiesc se încadrează în circa 100–120 de ani.</p>`,
      `<p style="margin-bottom:8px">Domeniul culturii și educației în RSSM a fost ideologizat excesiv, a fost impusă cenzura drastică și s-a urmărit constant rusificarea și deznaționalizarea. Totuși, datorită oamenilor de cultură și știință, în toate domeniile au fost înregistrate rezultate, reușindu-se a se păstra suflul național.</p>
<p style="margin-bottom:8px">Cenzură – control prealabil exercitat de către un organ al statului asupra conținutului publicațiilor, spectacolelor, emisiunilor de radioteleviziune și, uneori, asupra corespondenței și convorbirilor telefonice. Ideologizare – pătrunderea ideologiilor politice în toate domeniile vieții din societățile totalitare.</p>
<p style="margin-bottom:8px">„Fata la fereastră”, Valentina Rusu-Ciobanu, <strong>1957</strong></p>
<p style="margin-bottom:8px">„Cor sătesc” (tapiserie), Maria Saca Răcilă, <strong>1971</strong></p>
<p style="margin-bottom:8px">În RSSM, ca și în celelate republici unionale, s-a impus cu forța ideologia marxist-leninistă, care a dominat toate sferele de activitate cultural-spirituală.</p>`,

<p style="margin-bottom:8px">Cercetare – investigație originală în scopul dobândirii de noi cunoștințe științifice sau tehnologice. Frontispiciu – partea superioară a fațadei principale a unui edificiu.</p>
<p style="margin-bottom:8px">Proclamarea independenței Republicii Moldova, deschiderea hotarelor, valorile democratice și lichidarea cenzurii au oferit oamenilor de artă și de știință noi oportunități de manifestare și posibilități de creație. Modificări radicale în viața culturală și, implicit, în procesul literar în spațiul dintre Nistru și Prut au fost aduse de revenirea la valorile culturii naționale, trecerea la alfabetul latin și contactele strânse cu oamenii de cultură din România. Literatura. Scriitorii care s-au situat în fruntea mișcării naționale de la sfârșitul anilor ’80 au avut o activitate prodigioasă și în deceGrigore Vieru (<strong>1935</strong>–<strong>2009</strong>), reniile următoare. S-au remarcat Grigore Vieru, Ion Hadârcă, Dumitru marcabil poet al contemporaMatcovschi (Imne și blesteme (<strong>1991</strong>), Crucea (<strong>2008</strong>)), Leonida Lari neității. Poeziile sale au abordat (Dincolo de ce văd ochii (<strong>1991</strong>)), Vasile Romanciuc (Lumina glasului diverse teme: neam, țară, mamă, lăuntric (<strong>2016</strong>)), Arcadie Suceveanu (Cavalerul Înzadar (<strong>2001</strong>)), Leo copilărie, bucuriile vieții, valorile Butnaru (O sută și una de poezii (<strong>2018</strong>)). Printre prozatorii cunoscuți naționale. Printre cărțile de poese numără Aureliu Busuioc (Hronicul găinarilor (<strong>2006</strong>)), Nicolae Rusu zii editate după <strong>1991</strong> sunt Rugă(Pușlamielul (<strong>2017</strong>)), Vladimir Beșleagă (Cumplite vremi (<strong>2017</strong>)), Niciune pentru mama (<strong>1994</strong>), Văd și colae Dabija (Tema pentru acasă (<strong>2009</strong>)), Dumitru Crudu (Măcel în mărturisesc (<strong>1996</strong>). În <strong>1988</strong> i s-a Georgia (<strong>2008</strong>)), Claudia Partole (Straniera (<strong>2020</strong>)), Tatiana Țîbuleac acordat cea mai prestigioasă dis(Vara în care mama a avut ochii verzi (<strong>2017</strong>)), Liliana Corobca (Kintincție internațională în domeniul derland (<strong>2014</strong>)), Olga Căpățână (Dobrenii (<strong>2019</strong>)). literaturii pentru copii: Diploma Teatrul. În Republica Moldova activează 18 teatre dramatice, de Onoare „H.Ch. Andersen”. ProTeatrul de Operă și Balet „Maria Bieșu”, un teatru etno-folcloric și motor al ideii naționale, patriotisdouă teatre de păpuși. După <strong>1990</strong>, actorii și regizorii din noua genemul fiind una dintre temele cenrație au participat la renașterea teatrelor. Teatrul Moldovenesc Acatrale ale operei sale. Membru de demic Muzical-Dramatic de Stat ,,A.S. Pușkin” s-a redeschis în <strong>1994</strong> Onoare al Academiei Române. cu numele Teatrul Național „Mihai Eminescu”, care s-a remarcat prin Apreciază rolul istoric al poetuactivitatea regizorilor Alexandru Vasilache, Ilie Todorov, Mihai Fusu, lui Grigore Vieru. Petru Hadârcă, Alexandru Cozub, Luminița Țâcu. La Teatrul „Luceafărul” au montat piese regizorii Mihai Fusu, Boris Focșa, Radu Hîrnu. Din <strong>1990</strong>, la Chișinău activează Teatrul Municipal „Satiricus”, fondat de regizorul Alexandru Grecu. Repertoriul Teatrului Dramatic Rus „A.P. Cehov” a fost alcătuit din dramaturgia clasică și contemporană rusă și universală. Continuă să activeze Teatrul Republican pentru Tineret „S ulițî Roz” („Teatrul de pe strada Trandafirilor”), creat în <strong>1978</strong> de Iuri Harmelin.</p>

function initTheme(){
  const saved=localStorage.getItem("ep_theme")||"light";
  document.documentElement.setAttribute("data-theme",saved);
  updateThemeBtn(saved);
}
function toggleTheme(){
  const cur=document.documentElement.getAttribute("data-theme");
  const next=cur==="dark"?"light":"dark";
  document.documentElement.setAttribute("data-theme",next);
  localStorage.setItem("ep_theme",next);
  updateThemeBtn(next);
}
function updateThemeBtn(t){
  const btn=document.getElementById("theme-btn");
  if(btn)btn.textContent=t==="dark"?"☀️":"🌙";
}
initTheme();

function handleSearch(q){
  const res=document.getElementById("search-results");
  if(!q||q.length<2){res.style.display="none";return;}
  const matches=QS.filter(x=>x.q.toLowerCase().includes(q.toLowerCase())||x.ch.toLowerCase().includes(q.toLowerCase())).slice(0,6);
  if(!matches.length){res.style.display="none";return;}
  res.innerHTML=matches.map(m=>`<div class="search-item" onclick="goToQuestion('${m.id}')"><div class="search-item-q">${m.q.slice(0,80)}${m.q.length>80?"...":""}</div><div class="search-item-meta">${m.ch} · ${TTYPE[m.tp]||m.tp}</div></div>`).join("");
  res.style.display="block";
}
function closeSearch(){document.getElementById("search-results").style.display="none";}
function goToQuestion(id){
  closeSearch();document.getElementById("search-inp").value="";
  praChap="all";praType="all";
  const q=QS.find(x=>x.id===id);if(!q)return;
  praQ=q;praVerified=false;goPage("practice");
}

  {id:"q8",ch:"Conferința de Pace Paris",tp:"cauze",dif:3,q:"Determină două obiective ale Conferinței de pace de la Paris (1919-1920). Explică răspunsul.",a:"1. Semnarea tratatelor de pace cu statele învinse (Germania, Austria, Ungaria, Bulgaria, Turcia). 2. Crearea Ligii Națiunilor și promovarea principiului autodeterminării naționale (Cele 14 Puncte ale lui Wilson).",pts:4,src:"nu numai de a satisface interesele naționale, ci și de a instaura o ordine internațională mai justă"},
  {id:"q9",ch:"Conferința de Pace Paris",tp:"personalitate",dif:3,q:"Numește o personalitate importantă de la Conferința de pace de la Paris (1919). Formulează două argumente.",a:"Woodrow Wilson (SUA). 1. A propus 'Cele 14 Puncte' (1918) — baza negocierilor de pace, inclusiv principiul autodeterminării. 2. A insistat pentru crearea Ligii Națiunilor ca organism de securitate colectivă.",ex:"Ironic: Wilson a creat Liga Națiunilor, dar SUA nu a aderat — Senatul american a refuzat ratificarea.",pts:5,src:""},
  {id:"q10",ch:"Sistemul de la Versailles",tp:"identificare",dif:1,q:"Identifică un tratat component al Sistemului de la Versailles.",a:"Tratatul de Pace cu Austria (Saint-Germain, 10 septembrie 1919) SAU Tratatul de Pace cu Ungaria (Trianon, 4 iunie 1920) SAU Tratatul de la Versailles cu Germania (28 iunie 1919).",ex:"Sistemul Versailles = 5 tratate: cu Germania, Austria, Ungaria, Bulgaria, Turcia.",pts:1,src:""},
  {id:"q11",ch:"Sistemul de la Versailles",tp:"termen",dif:2,q:"Explică termenul Liga Națiunilor.",a:"Prima organizație internațională permanentă (1919-1920) cu scopul menținerii păcii mondiale și rezolvarea pașnică a conflictelor. Creată prin Tratatul de la Versailles. Precursoarea ONU (1945).",ex:"Paradox: Propusă de Wilson, dar SUA nu a aderat — Senatul american a refuzat ratificarea.",pts:2,src:""},
  {id:"q12",ch:"Sistemul de la Versailles",tp:"descriere",dif:3,q:"Formulează două consecințe ale Tratatului de la Versailles pentru Germania.",a:"1. Economic: Reparații de 20 miliarde mărci aur, pierderea coloniilor, responsabilizată de toate pagubele de război. 2. Militar: Armata limitată la 100.000 oameni, serviciu militar abolit, fără aviație sau flotă militară.",ex:"Condițiile umilitoare au creat resentimentele care au alimentat ascensiunea nazismului.",pts:4,src:"Armata germană nu poate depăși cifra de 100.000 de oameni. Serviciul militar este abolit."},
  {id:"q13",ch:"Sistemul de la Versailles",tp:"opinie",dif:4,q:"Exprimă-ți opinia: Sistemul de la Versailles a pus bazele unei păci trainice sau fragile?",a:"FRAGILE: 1. Condițiile umilitoare ale Versailles au creat spirit revanșard în Germania — Hitler a exploatat aceste resentimente. 2. Liga Națiunilor era slabă: SUA nu era membră; nu putea opri agresiunile naziste (1936-1939).",ex:"Economistul Keynes numea Versailles 'o pace cartagineză' — prea dură ca să fie durabilă.",pts:5,src:""},
  {id:"q14",ch:"România Interbelică",tp:"termen",dif:2,q:"Explică termenul constituție.",a:"Legea fundamentală a unui stat, care stabilește forma de guvernământ și de organizare socială, precum și drepturile și îndatoririle fundamentale ale cetățenilor.",ex:"Constituția României din 1923 — una dintre cele mai moderne din Europa la acea vreme.",pts:2,src:""},
  {id:"q15",ch:"România Interbelică",tp:"cauze",dif:3,q:"Descrie două consecințe ale adoptării Constituției din 1923.",a:"1. A consolidat juridic Marea Unire — cadrul legal pentru România Mare ca stat național unitar și indivizibil. 2. A garantat drepturi egale tuturor cetățenilor indiferent de etnie sau religie; separarea puterilor; pluralismul politic.",pts:4,src:"Românii, fără deosebire de origine etnică, de limbă sau de religie, se bucură de libertatea conștiinței"},
  {id:"q16",ch:"România Interbelică",tp:"argumentare",dif:4,q:"Argumentează: Reforma agrară din 1921 a contribuit la modernizarea societății românești.",a:"1. A expropriat 5,8 milioane ha și a împroprietărit 1.393.353 de țărani — cea mai amplă redistribuire de pământ. 2. A eliminat clasa marilor moșieri și a creat o clasă largă de mici proprietari. 3. A îmbunătățit standardul de viață rural și a stimulat producția agricolă internă.",pts:7,src:""},
  {id:"q17",ch:"Mișcarea Națională Basarabia",tp:"identificare",dif:2,q:"Identifică două forme de manifestare ale mișcării naționale din Basarabia (1917-1918).",a:"1. Constituirea Partidului Național Moldovenesc (aprilie 1917). 2. Congresul militarilor moldoveni (octombrie 1917). De asemenea: Congresul general al învățătorilor moldoveni (mai 1917).",ex:"Revoluția rusă din 1917 a creat oportunitatea de aur pentru mișcarea națională basarabeană.",pts:2,src:""},
  {id:"q18",ch:"Mișcarea Națională Basarabia",tp:"identificare",dif:1,q:"Numește organul legislativ suprem al Republicii Democratice Moldovenești.",a:"Sfatul Țării — organ reprezentativ și legislativ al Basarabiei, constituit la 21 noiembrie 1917. A votat unirea cu România la 27 martie 1918 cu 86 voturi pentru, 3 contra.",ex:"Sfatul Țării: 150 deputați — 70% moldoveni, 30% minorități naționale.",pts:1,src:""},
  {id:"q19",ch:"Mișcarea Națională Basarabia",tp:"personalitate",dif:3,q:"Numește o personalitate din Basarabia care a contribuit la unire. Formulează două argumente.",a:"Ion Inculeț (1884-1940). 1. Primul președinte al Sfatului Țării — a prezidat votul unirii din 27 martie 1918. 2. A negociat condițiile unirii cu guvernul român și a reprezentat interesele Basarabiei.",ex:"Alexei Mateevici, Pantelimon Halippa și Gherman Pântea — alte figuri-cheie ale mișcării.",pts:5,src:""},
  {id:"q20",ch:"Pactul Ribbentrop-Molotov",tp:"identificare",dif:1,q:"Numește evenimentul în cadrul căruia a fost semnat Protocolul adițional secret.",a:"23 august 1939 — Pactul de neagresiune sovieto-german (Ribbentrop-Molotov), semnat la Moscova.",ex:"Lumea a fost șocată: Germania nazistă și URSS comunistă, dușmani ideologici, s-au aliat în secret.",pts:1,src:""},
  {id:"q21",ch:"Pactul Ribbentrop-Molotov",tp:"identificare",dif:2,q:"Numește cel puțin două state vizate de prevederile Pactului Molotov-Ribbentrop.",a:"Finlanda, Estonia, Letonia, Lituania (sfera sovietică), Polonia (împărțită), România — Basarabia menționată explicit ca interes sovietic în Protocolul Secret.",pts:2,src:"Privitor la Sud-estul Europei, atenția este atrasă de interesul Uniunii Sovietice în Basarabia"},
  {id:"q22",ch:"Pactul Ribbentrop-Molotov",tp:"termen",dif:2,q:"Explică termenul revizionism.",a:"Politică prin care un stat urmărește modificarea prin forță sau presiune a tratatelor internaționale și a frontierelor existente, considerate nedrepte sau impuse forțat.",ex:"State revizioniste interbelice: Germania (față de Versailles), Ungaria (față de Trianon), URSS.",pts:2,src:""},
  {id:"q23",ch:"Pierderile Teritoriale 1940",tp:"identificare",dif:2,q:"Identifică două teritorii anexate de URSS conform notelor ultimative din 1940.",a:"Basarabia și Nordul Bucovinei (și ținutul Herța), ocupate de trupele sovietice la 28 iunie 1940, după notele ultimative din 26-28 iunie.",ex:"România, izolată internațional după căderea Franței, a acceptat evacuarea în numai 4 zile.",pts:2,src:""},
  {id:"q24",ch:"Pierderile Teritoriale 1940",tp:"termen",dif:2,q:"Explică termenul ultimatum.",a:"Cerere categorică adresată de un stat altui stat, cu termen-limită scurt și sub amenințarea forței militare. Acceptarea este obligatorie sau urmează consecințe grave.",ex:"Nota ultimativă a URSS din 26-28 iunie 1940 a cerut evacuarea în 4 zile — sau invazie.",pts:2,src:""},
  {id:"q25",ch:"Pierderile Teritoriale 1940",tp:"descriere",dif:3,q:"Descrie două consecințe ale pierderilor teritoriale ale României din vara 1940.",a:"1. Politice: Pierderea a 33,79% din teritoriu; abdicarea forțată a regelui Carol II (6 septembrie 1940). 2. Social-economice: Pierderea a 34,02% din populație; dezorganizarea economiei naționale.",pts:4,src:"pierderile teritoriale au însumat 33,79% din teritoriu și 34,02% din populație"},
  {id:"q26",ch:"Al Doilea Război Mondial",tp:"identificare",dif:1,q:"Identifică limitele cronologice ale celui de-al Doilea Război Mondial.",a:"1 septembrie 1939 (atacul Germaniei asupra Poloniei) — 2 septembrie 1945 (capitularea Japoniei pe vasul USS Missouri).",pts:2,src:""},
  {id:"q27",ch:"Al Doilea Război Mondial",tp:"cauze",dif:3,q:"Formulează o cauză a celui de-al Doilea Război Mondial.",a:"Condițiile umilitoare ale Tratatului de la Versailles (1919) au generat resentimente în Germania, favorizând ascensiunea nazismului și politica revanșardă a lui Hitler.",ex:"Alte cauze: Criza Economică 1929-1933, politica de conciliere (München 1938), Pactul Ribbentrop-Molotov.",pts:2,src:""},
  {id:"q28",ch:"Al Doilea Război Mondial",tp:"personalitate",dif:3,q:"Numește o personalitate care a influențat mersul WWII. Formulează două argumente.",a:"Winston Churchill. 1. A refuzat să negocieze cu Hitler în 1940 când Marea Britanie era singura putere care mai rezista. 2. A contribuit la formarea Coaliției Antihitleriste cu Roosevelt și Stalin (Teheran 1943, Ialta 1945).",pts:5,src:""},
  {id:"q29",ch:"Lumea Postbelică",tp:"identificare",dif:2,q:"Identifică două blocuri politico-militare create în perioada postbelică.",a:"1. NATO — Organizația Tratatului Atlanticului de Nord (4 aprilie 1949). 2. OTV — Organizația Tratatului de la Varșovia (14 mai 1955).",pts:2,src:""},
  {id:"q30",ch:"Lumea Postbelică",tp:"termen",dif:2,q:"Explică termenul cortină de fier.",a:"Expresie a lui Winston Churchill (discurs Fulton, 5 martie 1946) pentru granița ideologică ce despărțea Europa în Occidentul liber și democratic și Estul comunist sub dominație sovietică.",pts:2,src:""},
  {id:"q31",ch:"Lumea Postbelică",tp:"argumentare",dif:4,q:"Argumentează: Planul Marshall a avut o contribuție semnificativă în relațiile internaționale postbelice.",a:"1. Economic: 12,4 miliarde dolari (1948-1951) au reconstruit economiile vest-europene. 2. Politic: A prevenit extinderea comunismului în Europa Occidentală. 3. A consolidat alianța transatlantică și a grăbit crearea NATO.",pts:7,src:"Scopul nostru trebuie să fie renașterea unei economii mondiale sănătoase"},
  {id:"q32",ch:"RSSM și Regimul Comunist",tp:"termen",dif:2,q:"Explică termenul colectivizare.",a:"Procesul forțat de transformare a gospodăriilor agricole private în proprietate colectivă (colhoz/sovhoz) de stat. Realizat în RSSM în 1944-1951 prin teroare, deportări și confiscări.",ex:"Colectivizarea a distrus structura tradițională a agriculturii basarabene și a provocat foametea.",pts:2,src:""},
  {id:"q33",ch:"RSSM și Regimul Comunist",tp:"termen",dif:2,q:"Explică termenul chiabur.",a:"Țăran înstărit ('kulak' în rusă), considerat 'dușman de clasă' de regimul sovietic. Supus taxelor confiscatorii, exproprierii și deportărilor pentru a facilita colectivizarea forțată.",pts:2,src:""},
  {id:"q34",ch:"RSSM și Regimul Comunist",tp:"descriere",dif:3,q:"Descrie două consecințe ale instaurării regimului sovietic stalinist în Basarabia.",a:"1. Economic: Naționalizarea băncilor, industriei, transportului; colectivizarea forțată; rechiziții abuzive. 2. Uman: Deportări masive (1941, 1949 — 40.850 familii), foamete organizată (1946-1947, ~200.000 morți).",pts:4,src:"au fost comise crime împotriva umanității: omoruri în masă, deportări, foamete organizată"},
  {id:"q35",ch:"RSSM și Regimul Comunist",tp:"argumentare",dif:4,q:"Argumentează: Colectivizarea a marcat esențial viața populației rurale din RSSM.",a:"1. Proprietatea privată eliminată total — țăranul a devenit muncitor fără pământ, dependent de colhoz. 2. Rechiziții forțate excesive → foametea din 1946-1947 (~200.000 morți). 3. Deportările din 1949 au accelerat colectivizarea prin teroare — planurile au fost depășite de 2 ori în 6 luni.",pts:7,src:""},
  {id:"q36",ch:"Independența Republicii Moldova",tp:"identificare",dif:1,q:"Numește evenimentul proclamat de Parlamentul Republicii Moldova.",a:"27 august 1991 — Proclamarea independenței Republicii Moldova. Parlamentul a adoptat Declarația de Independență unanim (277 deputați, vot nominal).",ex:"Data de 27 august 1991 este Ziua Națională a Republicii Moldova.",pts:1,src:""},
  {id:"q37",ch:"Independența Republicii Moldova",tp:"termen",dif:2,q:"Explică termenul regim democratic.",a:"Sistem politic în care puterea emană de la popor, exercitată prin alegeri libere și corecte. Caracteristici: pluripartidism, separarea puterilor, drepturi și libertăți garantate, presă liberă.",pts:2,src:""},
  {id:"q38",ch:"Independența Republicii Moldova",tp:"cauze",dif:3,q:"Explică două cauze care au determinat adoptarea Declarației de independență.",a:"1. Externă: Prăbușirea URSS — criza economică, Perestroika, eșecul puciului din august 1991. 2. Internă: Mișcarea democratică de eliberare națională — Frontul Popular, Marile Adunări Naționale (1989-1991).",pts:4,src:""},
  {id:"q39",ch:"Independența Republicii Moldova",tp:"personalitate",dif:3,q:"Numește o personalitate care a contribuit la proclamarea independenței R.Moldova. Formulează două argumente.",a:"Alexandru Moșanu — președintele Parlamentului. 1. A prezidat ședința istorică din 27 august 1991. 2. A promovat legislația democratică: limba română (1989), tricolorul (1990), stema (1990).",pts:5,src:""},
  {id:"q40",ch:"Relații Internaționale Interbelice",tp:"termen",dif:2,q:"Explică termenul securitate colectivă.",a:"Sistem de angajamente reciproce prin care statele membre se obligă să se apere colectiv împotriva oricărei agresiuni, considerând un atac împotriva unuia ca atac împotriva tuturor.",pts:2,src:""},
  {id:"q41",ch:"Relații Internaționale Interbelice",tp:"descriere",dif:3,q:"Descrie două alianțe regionale concepute de diplomația română în perioada interbelică.",a:"1. Mica Înțelegere (1920-1921): România, Cehoslovacia, Iugoslavia — contracararea revizionismului maghiar și apărarea granițelor de la Versailles. 2. Înțelegerea Balcanică (1934): România, Iugoslavia, Turcia, Grecia — contracararea revizionismului bulgar.",pts:4,src:""},
  {id:"q42",ch:"Relații Internaționale Interbelice",tp:"personalitate",dif:3,q:"Apreciază rolul lui Nicolae Titulescu. Formulează două argumente.",a:"1. Ales de două ori președinte al Adunării Generale a Ligii Națiunilor (1930-1931). 2. A restabilit relațiile diplomatice cu URSS (1934) și a promovat dezarmarea și rezolvarea pașnică a conflictelor.",pts:5,src:""},
  {id:"q43",ch:"Criza Economică 1929-1933",tp:"argumentare",dif:4,q:"Argumentează: Marea Depresiune a avut efecte distructive pentru societatea interbelică.",a:"1. Economic: Producția industrială s-a prăbușit cu 41-46% (Germania, SUA); bursa din NY a căzut catastrofal. 2. Social: Șomaj masiv — Germania 40%, SUA 25%. 3. Politic: Hitler a venit la putere pe fondul crizei — Marea Depresiune a făcut posibil nazismul.",pts:7,src:"urmările politice ale crizei au fost mai nefaste pentru omenire decât consecințele economice"},
  {id:"q44",ch:"Criza Economică 1929-1933",tp:"termen",dif:2,q:"Determină o consecință a crizei economice din 1929-1933.",a:"Creșterea dramatică a șomajului — Germania: 40%, SUA: 25%; scăderea prețurilor cerealiere cu 60-62%; falimentarea a sute de întreprinderi (la Chișinău: 163 firme).",pts:2,src:""},
  {id:"q45",ch:"Regimuri Totalitare",tp:"identificare",dif:2,q:"Identifică două evenimente care marchează instaurarea regimurilor totalitare interbelice.",a:"1. 28 octombrie 1922: Marșul fasciștilor spre Roma — Mussolini devine premier al Italiei. 2. 30 ianuarie 1933: Adolf Hitler este numit cancelar al Germaniei.",pts:2,src:""},
  {id:"q46",ch:"Regimuri Totalitare",tp:"termen",dif:2,q:"Explică termenul regim totalitar.",a:"Regim politic în care puterea aparține total unui lider sau unui partid unic, cu control absolut asupra tuturor aspectelor vieții. Caracteristici: cenzură, poliție politică, propagandă, eliminarea opoziției.",pts:2,src:""},
  {id:"q47",ch:"Regimuri Totalitare",tp:"termen",dif:2,q:"Explică termenul cultul personalității.",a:"Fenomen politic în care un lider este promovat prin propagandă intensivă ca figură aproape divină, infailibilă și indispensabilă statului. Specific regimurilor totalitare (Stalin, Hitler, Mussolini).",pts:2,src:""},
  {id:"q48",ch:"Cultură și Știință",tp:"argumentare",dif:4,q:"Argumentează: Dezvoltarea științifică și tehnologică a schimbat viața în secolul XX.",a:"1. Medicină: Penicilina (Fleming, 1928) — milioane de vieți salvate. 2. Transport: Automobilul (Ford Model T) și aviația au revoluționat mobilitatea. 3. Comunicații: Radio (1920s) și internetul (1991) au creat accesul global la informație.",pts:7,src:"Nici o perioadă din istorie nu a fost mai dependentă de științele naturale decât secolul XX"},
  {id:"q49",ch:"Cultură și Știință",tp:"personalitate",dif:2,q:"Apreciază importanța lui Grigore Vieru pentru cultura națională.",a:"Grigore Vieru (1935-2009). 1. Poet emblematic al identității românești în Basarabia — versurile despre limbă și patrie au mobilizat mișcarea națională (1988-1991). 2. Ales membru corespondent al Academiei Române (1993).",pts:3,src:""},
  {id:"q50",ch:"Cultură și Știință",tp:"personalitate",dif:2,q:"Apreciază contribuția lui Eugen Doga la cultura națională.",a:"Eugen Doga (1937-2025). 1. 'Valsul' din 'Dulcea și tandra mea fiară' — recunoscut mondial. 2. Coloane sonore pentru 'Șatra', 'Lăutarii', 'Maria Mirabela' — a promovat cultura moldovenească pe scene internaționale.",pts:3,src:""},
  {id:"q51",ch:"Cultură și Știință",tp:"personalitate",dif:2,q:"Apreciază contribuția Mariei Bieșu la cultura națională.",a:"Maria Bieșu (1935-2012). 1. Câștigătoarea Concursului Puccini (1967, Tokyo) — prima soprană din spațiul sovietic cu această distincție. 2. A organizat festivalul 'Invită Maria Bieșu', promovând cultura R.Moldova la nivel internațional.",pts:3,src:""},
  {id:"q52",ch:"Cultură și Știință",tp:"personalitate",dif:2,q:"Apreciază contribuția lui Alexandru Plămădeală la cultura națională.",a:"Alexandru Plămădeală (1888-1940). 1. Autorul monumentului lui Ștefan cel Mare din Chișinău (bronz, 1928) — simbol iconic al identității naționale. 2. Pictor, grafician, a contribuit la renașterea culturală românească în Basarabia interbelică.",pts:3,src:""},
  {id:"q53",ch:"România Interbelică",tp:"termen",dif:2,q:"Explică termenul democrație.",a:"Formă de organizare politică în care puterea emană de la popor și este exercitată direct sau prin reprezentanți aleși liber. Principii: separarea puterilor, pluripartidism, drepturi și libertăți garantate.",pts:2,src:""},
  {id:"q54",ch:"RSSM și Regimul Comunist",tp:"termen",dif:2,q:"Explică termenul suveranitate.",a:"Puterea supremă a unui stat de a-și exercita autoritatea pe teritoriul său fără amestec extern. Declarația de Suveranitate a RSSM (23 iunie 1990) a fost primul pas legal spre independența R.Moldova.",pts:2,src:""},
  {id:"q55",ch:"Lumea Postbelică",tp:"termen",dif:2,q:"Explică termenul Război Rece.",a:"Conflict indirect (1947-1991) între SUA și URSS, fără confruntare militară directă, manifestat prin: cursă a înarmărilor nucleare, propagandă, conflicte prin delegați (Coreea, Vietnam, Cuba), competiție spațială.",pts:2,src:""},
  {id:"q56",ch:"Mișcarea Națională Basarabia",tp:"termen",dif:2,q:"Explică termenul autonomie.",a:"Dreptul unui teritoriu de a se administra singur, în cadrul unui stat mai mare condus de o putere centrală. Implică organe proprii de guvernare, dar nu independență deplină față de stat.",ex:"Basarabia: autonomie (dec.1917) → independență (ian.1918) → unire cu România (mart.1918).",pts:2,src:""},
  {id:"q57",ch:"Sistemul de la Versailles",tp:"personalitate",dif:3,q:"Exprimă-ți opinia despre contribuția lui Nicolae Titulescu la securitatea internațională.",a:"Titulescu — cel mai important diplomat român. 1. Ales de 2 ori președinte al Adunării Generale a Ligii Națiunilor. 2. A promovat securitatea colectivă și dezarmarea; a restabilit relațiile cu URSS (1934).",pts:5,src:""},
  {id:"q58",ch:"Al Doilea Război Mondial",tp:"termen",dif:2,q:"Explică termenul Război total.",a:"Conflict militar în care sunt mobilizate toate resursele unui stat — economice, umane, industriale, psihologice — și nu există granița clară dintre front și populația civilă. WWII: 1,7 miliarde oameni implicați, 55-80 milioane morți.",pts:2,src:""},
  {id:"q59",ch:"Conferința de Pace Paris",tp:"termen",dif:2,q:"Explică termenul principiul autodeterminării.",a:"Dreptul fiecărui popor de a-și decide liber forma de guvernare și apartenența statală, fără impunere externă. Proclamat de W. Wilson prin 'Cele 14 Puncte' (1918) ca bază a noii ordini internaționale.",pts:2,src:""},
  {id:"q60",ch:"Independența Republicii Moldova",tp:"opinie",dif:4,q:"Exprimă-ți opinia: Proclamarea independenței R.Moldova s-a realizat pe cale democratică. Formulează două argumente.",a:"PRO: 1. Declarația a fost votată de un Parlament ales democratic, unanim (277 din 277 deputați). 2. Procesul a inclus participarea masivă a populației — Marile Adunări Naționale cu sute de mii de participanți.",pts:5,src:""},

  // ── PERSONALITĂȚI LIPSĂ DIN PROGRAMĂ ──
  {id:"q61",ch:"Regimuri Totalitare",tp:"personalitate",dif:3,q:"Numește o personalitate care a condus URSS în perioada interbelică. Apreciază rolul ei în istorie, formulând două argumente.",a:"Iosif Stalin (1924-1953). 1. A industrializat forțat URSS prin planuri cincinale, transformând-o în putere mondială. 2. A impus teroarea stalinistă: deportări, Gulag, epurări — milioane de victime; a instaurat cultul personalității.",ex:"Stalin: 'Moartea unui om este o tragedie; moartea unui milion este o statistică.'",pts:5,src:""},
  {id:"q62",ch:"România Interbelică",tp:"personalitate",dif:2,q:"Apreciază contribuția lui Carol II la evoluția politică a României interbelice. Formulează două argumente.",a:"Carol II (rege 1930-1940). 1. A instaurat regimul autoritar-regal (1938) — a suspendat constituția și a interzis partidele politice. 2. A condus România în perioada pierderilor teritoriale (1940), abdicând forțat pe 6 septembrie 1940.",ex:"Carol II: personalitate contradictorie — mecena al artei, dar și dictator care a slăbit democrația română.",pts:3,src:""},
  {id:"q63",ch:"Cultură și Știință",tp:"personalitate",dif:2,q:"Apreciază contribuția lui Constantin Brâncuși la cultura națională. Formulează două argumente.",a:"Constantin Brâncuși (1876-1957). 1. Sculptor de renume mondial — 'Coloana Infinitului', 'Masa Tăcerii', 'Poarta Sărutului' (Târgu-Jiu). 2. Considerat fondatorul sculpturii moderne; a influențat arta mondială a sec. XX.",ex:"Brâncuși: 'Nu sunt sculptor; sunt înger.' Originar din Hobița, Gorj.",pts:3,src:""},
  {id:"q64",ch:"Cultură și Știință",tp:"personalitate",dif:2,q:"Apreciază importanța Mariei Cebotari pentru cultura națională. Formulează două argumente.",a:"Maria Cebotari (1910-1949). 1. Soprană basarabeană de renume mondial — a cântat pe scenele din Viena, Berlin, Roma, Londra. 2. A promovat valorile culturale românești pe scena internațională în perioada interbelică.",ex:"Considerată una din cele mai mari soprane ale sec. XX; roluri în opere de Puccini, Verdi, Mozart.",pts:3,src:""},
  {id:"q65",ch:"Mișcarea Națională Basarabia",tp:"personalitate",dif:2,q:"Apreciază contribuția lui Alexei Mateevici la cultura națională. Formulează două argumente.",a:"Alexei Mateevici (1888-1917). 1. Autorul poemului 'Limba noastră' (1917) — imn al identității românești în Basarabia. 2. Preot și poet, a contribuit la trezirea conștiinței naționale în ajunul Unirii din 1918.",ex:"'Limba noastră' a devenit imn de stat al R.Moldova în 1994.",pts:3,src:""},
  {id:"q66",ch:"Lumea Postbelică",tp:"personalitate",dif:3,q:"Apreciază rolul lui Mihail Gorbaciov în istoria contemporană. Formulează două argumente.",a:"Mihail Gorbaciov (1931-2022). 1. A lansat Perestroika (restructurarea) și Glasnost (transparența) în 1985 — reforme ce au dus la destrămarea URSS. 2. A retras trupele din Afganistan și a permis reunificarea Germaniei; a pus capăt Războiului Rece.",ex:"Nobel pentru Pace (1990). Unii îl consideră erou, alții trădător al imperiului sovietic.",pts:5,src:""},
  {id:"q67",ch:"Lumea Postbelică",tp:"personalitate",dif:3,q:"Apreciază rolul Margaretei Thatcher în istoria contemporană. Formulează două argumente.",a:"Margaret Thatcher (1925-2013). 1. Prima femeie prim-ministru al Marii Britanii (1979-1990) — a aplicat politici economice liberale (thatcherism). 2. A colaborat cu Reagan împotriva URSS; a contribuit la sfărâmarea Imperiului Sovietic.",ex:"Supranumită 'Doamna de Fier'. A câștigat Războiul Falkland (1982).",pts:5,src:""},
  {id:"q68",ch:"RSSM și Regimul Comunist",tp:"personalitate",dif:3,q:"Apreciază rolul lui Nicolae Ceaușescu în istoria postbelică. Formulează două argumente.",a:"Nicolae Ceaușescu (1918-1989). 1. A condus România comunistă cu mână de fier (1965-1989) — cult al personalității, represiune, sistematizare forțată. 2. A fost executat în urma Revoluției din decembrie 1989 — singura revoluție violentă din Estul Europei.",ex:"Paradox: a condamnat invazia URSS în Cehoslovacia (1968), dar a instaurat cel mai sever regim din bloc.",pts:5,src:""},
  {id:"q69",ch:"Cultură și Știință",tp:"personalitate",dif:2,q:"Apreciază contribuția lui Mihai Volontir la cultura națională. Formulează două argumente.",a:"Mihai Volontir (1934-2015). 1. Actor emblematic al cinematografiei sovietice — rolul Budulai din serialul 'Țiganii' (1979) l-a consacrat în întreaga URSS. 2. A promovat cultura moldovenească prin roluri de excepție în filmele lui Emil Loteanu.",ex:"'Lăutarii' (1971) și 'Șatra' (1975) — filme care au dus Basarabia pe ecranele lumii.",pts:3,src:""},
  {id:"q70",ch:"Cultură și Știință",tp:"personalitate",dif:2,q:"Apreciază contribuția lui Emil Loteanu la cultura națională. Formulează două argumente.",a:"Emil Loteanu (1936-2003). 1. Regizor și poet — filmele 'Lăutarii' (1971), 'Șatra' (1975), 'Maria Mirabela' (1981) au adus faimă mondială culturii din Basarabia. 2. A colaborat cu Eugen Doga și Mihai Volontir, creând o școală cinematografică distinctă.",pts:3,src:""},
  {id:"q71",ch:"Independența Republicii Moldova",tp:"personalitate",dif:2,q:"Apreciază contribuția lui Dumitru Matcovschi la mișcarea de eliberare națională. Formulează două argumente.",a:"Dumitru Matcovschi (1939-2013). 1. Poet și dramaturg — 'Acasă' și 'Clopotnița' sunt opere emblematice ale identității naționale. 2. A participat activ la Mișcarea Democratică de Eliberare Națională (1988-1991) și la marile adunări naționale.",pts:3,src:""},
  // ── NOȚIUNI LIPSĂ ──
  {id:"q72",ch:"Regimuri Totalitare",tp:"termen",dif:2,q:"Explică termenul dictatură.",a:"Formă de guvernare în care puterea supremă este concentrată în mâinile unui singur individ sau grup, fără controale democratice. Dictatura elimină separarea puterilor, libertățile individuale și pluralismul politic.",ex:"Exemplu: dictatura fascistă în Italia (Mussolini), nazistă în Germania (Hitler), comunistă în URSS (Stalin).",pts:2,src:""},
  {id:"q73",ch:"RSSM și Regimul Comunist",tp:"termen",dif:2,q:"Explică termenul represiuni.",a:"Măsuri brutale de pedepsire sau înăbușire aplicate de un regim totalitar împotriva cetățenilor considerați 'dușmani ai poporului'. Includ: arestări, deportări în Siberia, execuții, internare în lagăre (Gulag).",ex:"Represiunile staliniste din RSSM: deportările din 1941 și 1949 (40.850 familii), foametea organizată 1946-1947.",pts:2,src:""},
];

function checkDaily(){const t=new Date().toDateString();if(P.dailyDate!==t){P.dailyDone=0;P.dailyDate=t;save();}}

function recordAnswer(ok,id,ch,pts){
  const today=new Date().toDateString(),yest=new Date(Date.now()-864e5).toDateString();
  if(P.lastDay!==today)P.streak=(P.lastDay===yest)?P.streak+1:1;
  P.lastDay=today;
  P.ids[id]={ok:(P.ids[id]?.ok||0)+(ok?1:0),n:(P.ids[id]?.n||0)+1};
  P.chs[ch]={n:(P.chs[ch]?.n||0)+1,ok:(P.chs[ch]?.ok||0)+(ok?1:0)};
  P.xp+=(ok?pts*10:3);P.lv=Math.floor(P.xp/200)+1;
  P.tot++;if(ok)P.cor++;
  P.review=ok?P.review.filter(x=>x!==id):(P.review.includes(id)?P.review:[...P.review,id]);
  P.dailyDone=(P.dailyDone||0)+1;
  const h=P.hist||[];const te=h.find(x=>x.d===today);
  if(te){te.n++;if(ok)te.ok++;}else h.push({d:today,n:1,ok:ok?1:0});
  P.hist=h.slice(-60);save();updateSidebar();checkAchs();
  if(ok&&P.soundOn)beep();
  if(P.dailyDone===P.dailyGoal)toast("🎯 Obiectiv zilnic atins!","gold");
  if(ok)toast("+"+pts*10+" XP","green");
}

function checkAchs(){ACHS.forEach(a=>{const k="ach_"+a.id;if(!localStorage.getItem(k)&&a.f(P)){localStorage.setItem(k,"1");toast("🏆 "+a.t,"gold");}});}

function beep(){try{const c=new(window.AudioContext||window.webkitAudioContext)();const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.setValueAtTime(523,c.currentTime);o.frequency.setValueAtTime(659,c.currentTime+.1);g.gain.setValueAtTime(.06,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.3);o.start();o.stop(c.currentTime+.35);}catch{}}

function toast(msg,type="red"){
  const cols={red:cssVar("--red"),green:cssVar("--green"),gold:cssVar("--gold"),blue:cssVar("--blue")};
  const w=el("toasts");const t=document.createElement("div");t.className="toast";t.innerHTML=msg;
  t.style.borderLeftColor=cols[type]||cols.red;w.appendChild(t);
  setTimeout(()=>{t.style.opacity="0";t.style.transition="opacity .3s";setTimeout(()=>t.remove(),300)},2800);
}

async function aiCheck(question,model,student){
  const trimmed=student.trim();
  const words=trimmed.split(/\s+/).filter(w=>w.length>1).length;
  const uniq=new Set(trimmed.toLowerCase().replace(/\s/g,"")).size;
  const hasHist=/\b(1[89]\d\d|20\d\d|român|basarab|război|tratat|unire|republică|moldov|const|reform|partid|independ|sovietic|german|austro|ungaria|franța|anglia|urss|nato|mondial|secol|august|iunie|septembrie|octombrie)\b/i.test(trimmed);
  if(words<3||uniq<6||trimmed.length<18)
    return{score:0,verdict:"INCORECT",feedback:"Răspunsul este prea scurt sau gol. Scrie un răspuns complet cu informații istorice.",plus:"—",minus:"Tot răspunsul lipsește.",errors:["Răspuns insuficient"]};
  const sys="Ești examinator strict la examenul național de Istorie clasa IX-a Moldova/România. NU ești tutore — ești corector de barem SEVER. Răspunsuri random sau fără fapte istorice concrete → 0.";
  const prompt=`REGULI: random/gibberish→0; fără date/fapte istorice→max 20; CORECT(75-100): toate elementele esențiale; PARȚIAL(35-74): unele elemente; INCORECT(0-34): greșit/insuficient.
ÎNTREBARE: ${question}
BAREM: ${model}
RĂSPUNS ELEV: ${student}
Răspunde DOAR JSON: {"score":0,"verdict":"INCORECT","feedback":"2-3 prop.","plus":"ce e corect","minus":"ce lipsește","errors":["eroare"]}`;
  const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:700,system:sys,messages:[{role:"user",content:prompt}]})});
  if(!r.ok)throw new Error("HTTP "+r.status);
  const d=await r.json();
  const raw=d.content.map(c=>c.text||"").join("").trim();
  const result=JSON.parse(raw.replace(/^[^{]*({[\s\S]*})[^}]*$/,"$1"));
  if(!hasHist&&result.score>20){result.score=Math.min(15,result.score);result.verdict="INCORECT";}
  return result;
}

function renderAiResult(result,tid){
  const s=result.score||0;
  const cls=s>=75?"good":s>=35?"partial":"bad";
  const col=s>=75?"var(--green)":s>=35?"var(--gold)":"var(--red)";
  const ico=s>=75?"✓":s>=35?"◑":"✗";
  const lbl=s>=75?"Răspuns corect":s>=35?"Răspuns parțial":"Răspuns incorect";
  const errs=result.errors||[];
  el(tid).innerHTML=`<div class="ai-res ${cls}">
    <div class="ai-score-row">
      <div class="ai-score-num" style="color:${col}">${ico} ${s}<sup style="font-size:14px">/100</sup></div>
      <div style="flex:1">
        <div class="ai-verdict" style="color:${col}">${lbl}</div>
        <div style="height:4px;background:rgba(0,0,0,.07);border-radius:99px;overflow:hidden;margin:4px 0;max-width:200px"><div style="height:100%;width:${s}%;background:${col};border-radius:99px;transition:width 1.2s ease"></div></div>
        <div class="ai-feedback">${result.feedback||""}</div>
      </div>
    </div>
    <div class="ai-grid">
      <div class="ai-box" style="background:rgba(39,133,90,.06);border:1px solid rgba(39,133,90,.15)"><div class="ai-box-lbl" style="color:var(--green)">✓ Ce ai scris corect</div><div class="ai-box-txt">${result.plus||"—"}</div></div>
      <div class="ai-box" style="background:rgba(184,134,11,.06);border:1px solid rgba(184,134,11,.15)"><div class="ai-box-lbl" style="color:var(--gold)">⚠ Ce lipsește</div><div class="ai-box-txt">${result.minus||"—"}</div></div>
    </div>
    ${errs.length?`<div style="margin-top:9px;padding:8px 11px;background:rgba(192,57,43,.05);border:1px solid rgba(192,57,43,.15);border-radius:6px"><div style="font-size:9px;color:var(--red);font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px">Erori</div>${errs.map(e=>`<div style="font-size:11.5px;color:var(--red);margin-bottom:1px">• ${e}</div>`).join("")}</div>`:""}
    <div style="margin-top:9px;font-size:11px;color:var(--ink4);padding-top:8px;border-top:1px solid rgba(0,0,0,.05)">${s>=75?"✅ Felicitări! Răspuns complet conform baremului.":s>=35?"⚡ Aproape! Completează elementele care lipsesc.":"❌ Răspuns insuficient. Studiază baremul și încearcă din nou."}</div>
  </div>`;
  return s>=60;
}

function startExam(){
  const sel=[];CHAPTERS.slice(1).forEach(c=>{const p=QS.filter(q=>q.ch===c.id);if(p.length)sel.push(rnd(p));});
  examQs=shuf(sel).slice(0,15);examAns={};examCur=0;examLeft=7200;examPhase="running";
  clearInterval(examIv);
  examIv=setInterval(()=>{
    examLeft--;
    const t=el("etimer");if(t){t.textContent=fmtT(examLeft);t.style.color=examLeft<300?"var(--red)":"var(--ink)";}
    if(examLeft<=0){clearInterval(examIv);finishExam();}
  },1000);
  renderExam();
}
function finishExam(){
  clearInterval(examIv);
  const done=examQs.filter(q=>(examAns[q.id]||"").trim().length>15);
  const nota=Math.round(done.length/Math.max(examQs.length,1)*10*10)/10;
  examResult={tot:examQs.length,ans:done.length,nota};
  if(nota>P.bestSim){P.bestSim=nota;save();}
  done.forEach(q=>recordAnswer(true,q.id,q.ch,q.pts));
  examPhase="done";renderExam();
}

// QUIZ
function startQuiz(){gameMode="quiz";quizQs=shuf(QS).slice(0,10);quizCur=0;quizScore=0;quizAnswered=false;quizSel=null;quizDone=false;buildQuizOpts();renderQuiz();}
function buildQuizOpts(){const q=quizQs[quizCur];const correct=q.a.slice(0,90);const wrongs=QS.filter(x=>x.id!==q.id).sort(()=>Math.random()-.5).slice(0,3).map(x=>x.a.slice(0,90));quizOpts=shuf([correct,...wrongs]);}
function pickOpt(i){
  if(quizAnswered)return;quizSel=quizOpts[i];quizAnswered=true;
  const ok=quizOpts[i]===quizQs[quizCur].a.slice(0,90);
  if(ok)quizScore++;recordAnswer(ok,quizQs[quizCur].id,quizQs[quizCur].ch,quizQs[quizCur].pts);renderQuiz();
}
function nextQuizQ(){if(quizCur>=quizQs.length-1){quizDone=true;renderQuiz();return;}quizCur++;quizAnswered=false;quizSel=null;buildQuizOpts();renderQuiz();}
function renderQuiz(){
  const w=pw("games");if(!w)return;
  if(quizDone){w.innerHTML=`<div><button class="btn btn-ghost" onclick="backToGames()">← Înapoi</button><div class="card" style="max-width:340px;margin:14px auto;text-align:center;padding:34px"><div style="font-size:50px;margin-bottom:11px">${quizScore>=8?"🌟":quizScore>=5?"🎯":"💪"}</div><div style="font-family:'Playfair Display',serif;font-size:50px;font-weight:900">${quizScore}<span style="font-size:22px;color:var(--ink4)">/${quizQs.length}</span></div><div style="color:var(--ink4);margin-bottom:18px">răspunsuri corecte</div><div style="display:flex;gap:8px;justify-content:center"><button class="btn btn-red" onclick="startQuiz()">Din nou</button><button class="btn btn-outline" onclick="backToGames()">← Meniu</button></div></div></div>`;return;}
  const q=quizQs[quizCur];
  w.innerHTML=`<div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:13px"><button class="btn btn-ghost btn-sm" onclick="backToGames()">← Înapoi</button><div style="display:flex;gap:8px;align-items:center"><span class="tag t-blue">Q ${quizCur+1}/${quizQs.length}</span><span class="tag t-gold">🏆 ${quizScore}</span></div></div>
    <div class="pb" style="margin-bottom:15px"><div class="pb-fill" style="width:${pct(quizCur+1,quizQs.length)}%;background:linear-gradient(90deg,var(--red),var(--blue))"></div></div>
    <div class="card">
      <span class="tag t-ink" style="margin-bottom:10px;display:inline-flex">${q.ch}</span>
      <p style="font-size:15px;font-weight:500;line-height:1.7;margin-bottom:16px;color:var(--ink)">${q.q}</p>
      ${quizOpts.map((o,i)=>{const cor=quizAnswered&&o===q.a.slice(0,90);const wr=quizAnswered&&o===quizSel&&!cor;return`<button class="opt${cor?" correct":wr?" wrong":""}" onclick="pickOpt(${i})" ${quizAnswered?"disabled":""}><span class="opt-letter">${String.fromCharCode(65+i)}</span><span>${o}</span></button>`;}).join("")}
      ${quizAnswered?`<button class="btn btn-primary" style="margin-top:5px" onclick="nextQuizQ()">${quizCur>=quizQs.length-1?"✓ Finalizează":"Următor →"}</button>`:""}
    </div>
  </div>`;
}

// MATCH
function startMatch(){
  gameMode="match";const tqs=QS.filter(q=>q.tp==="termen");
  const picked=shuf(tqs).slice(0,6);
  matchPairs=picked.map(q=>({id:q.id,term:q.q.replace(/explică termenul\s*[''"«»„"'"]/i,"").replace(/['''»"'"?!:,.\s]+$/,"").trim().toUpperCase(),def:q.a.slice(0,80)+"…",q}));
  matchShuffle=shuf([...matchPairs]);matchSel=null;matchDone=[];renderMatch();
}
function pickMatchLeft(id){matchSel=(matchSel===id?null:id);renderMatch();}
function pickMatchRight(id){
  if(!matchSel||matchDone.includes(id))return;
  if(id===matchSel){matchDone=[...matchDone,id];const p=matchPairs.find(p=>p.id===id);if(p)recordAnswer(true,p.q.id,p.q.ch,1);toast("✓ Corect!","green");}
  else{const p=matchPairs.find(p=>p.id===id);if(p)recordAnswer(false,p.q.id,p.q.ch,1);toast("✗ Greșit","red");}
  matchSel=null;renderMatch();
}
function renderMatch(){
  const w=pw("games");if(!w)return;
  if(matchDone.length===matchPairs.length&&matchPairs.length>0){w.innerHTML=`<div><button class="btn btn-ghost btn-sm" style="margin-bottom:13px" onclick="backToGames()">← Înapoi</button><div class="card" style="max-width:340px;text-align:center;padding:38px"><div style="font-size:48px;margin-bottom:11px">🎯</div><div style="font-family:'Playfair Display',serif;font-size:17px;font-weight:700;margin-bottom:8px">Felicitări!</div><p style="color:var(--ink4);margin-bottom:18px">Ai asociat corect toți termenii!</p><div style="display:flex;gap:8px;justify-content:center"><button class="btn btn-red" onclick="startMatch()">Termeni noi</button><button class="btn btn-outline" onclick="backToGames()">← Meniu</button></div></div></div>`;return;}
  w.innerHTML=`<div>
    <div style="display:flex;justify-content:space-between;margin-bottom:13px"><button class="btn btn-ghost btn-sm" onclick="backToGames()">← Înapoi</button><span class="tag t-green">${matchDone.length}/${matchPairs.length} asociate</span></div>
    <h2 style="font-family:'Playfair Display',serif;font-size:19px;margin-bottom:4px">Asociere termeni</h2>
    <p style="color:var(--ink4);font-size:12.5px;margin-bottom:13px">Selectează un termen, apoi definiția corespunzătoare</p>
    <div class="pb" style="margin-bottom:15px"><div class="pb-fill" style="width:${pct(matchDone.length,matchPairs.length)}%;background:var(--green)"></div></div>
    <div class="g2">
      <div class="match-col"><div class="sec-t">Termeni</div>${matchPairs.map(p=>{const done=matchDone.includes(p.id),sel=matchSel===p.id;return`<button class="${done?"done":sel?"sel":""}" onclick="pickMatchLeft('${p.id}')" ${done?"disabled":""}>${done?"✓ ":""}${p.term}</button>`;}).join("")}</div>
      <div class="match-col"><div class="sec-t">Definiții</div>${matchShuffle.map(p=>{const done=matchDone.includes(p.id);return`<button class="${done?"done":""}" onclick="pickMatchRight('${p.id}')" ${done||!matchSel?"disabled":""}>${p.def}</button>`;}).join("")}</div>
    </div>
  </div>`;
}

// HANGMAN
const HM_WORDS=[
  {w:"TRATAT",h:"Înțelegere scrisă între state cu forță juridică obligatorie"},
  {w:"AUTONOMIE",h:"Dreptul de a te administra singur în cadrul unui stat"},
  {w:"SUVERANITATE",h:"Puterea supremă a unui stat pe propriul teritoriu"},
  {w:"ULTIMATUM",h:"Cerere categorică cu termen limită și amenințare militară"},
  {w:"REVIZIONISM",h:"Politică de modificare forțată a frontierelor existente"},
  {w:"FASCISM",h:"Ideologie totalitară de extremă dreapta italiană (Mussolini)"},
  {w:"NAZISM",h:"Ideologia NSDAP — rasism, antisemitism, expansionism"},
  {w:"COLECTIVIZARE",h:"Transformarea forțată a proprietății private în colhozuri"},
  {w:"DEMOCRATIE",h:"Formă de guvernare în care puterea emană de la popor"},
  {w:"CONSTITUTIE",h:"Legea fundamentală a unui stat"},
  {w:"PROPAGANDA",h:"Manipularea maselor prin mesaje politice sistematice"},
  {w:"DEPORTARE",h:"Expulzarea forțată a unei populații dintr-o regiune"},
  {w:"REFERENDUM",h:"Consultarea directă a cetățenilor printr-un vot popular"},
  {w:"PLEBISCIT",h:"Vot popular direct pentru a decide o chestiune politică"},
];
function startHangman(){gameMode="hangman";const e=rnd(HM_WORDS);hmWord=e.w;hmHint=e.h;hmGuessed=[];hmWrong=0;renderHangman();}
function hmGuess(l){
  if(hmGuessed.includes(l))return;hmGuessed=[...hmGuessed,l];
  if(!hmWord.includes(l))hmWrong++;
  const won=!hmWord.split("").some(c=>!hmGuessed.includes(c));
  const lost=hmWrong>=6;
  if(won)recordAnswer(true,"hm_"+hmWord,"Regimuri Totalitare",1);
  else if(lost)recordAnswer(false,"hm_"+hmWord,"Regimuri Totalitare",1);
  renderHangman();
}
function renderHangman(){

      ${won?`<div style="margin-top:13px"><div style="color:var(--green);font-weight:600;font-size:13.5px;margin-bottom:11px">✅ Corect! Cuvântul era: <strong>${hmWord}</strong></div><button class="btn btn-red" onclick="startHangman()">Cuvânt nou</button></div>`:""}
      ${lost?`<div style="margin-top:13px"><div style="color:var(--red);font-weight:600;font-size:13.5px;margin-bottom:11px">❌ Cuvântul era: <strong>${hmWord}</strong></div><button class="btn btn-red" onclick="startHangman()">Încearcă din nou</button></div>`:""}
    </div>
    ${!won&&!lost?`<div class="hm-keys">${"ABCDEFGHIJKLMNOPQRSTUVWXYZĂÎÂȘȚ".split("").map(l=>`<button class="hm-key${hmGuessed.includes(l)?(hmWord.includes(l)?" hit":" miss"):""}" onclick="hmGuess('${l}')" ${hmGuessed.includes(l)||won||lost?"disabled":""}>${l}</button>`).join("")}</div>`:""}

  {label:"Al Doilea Război Mondial",items:[{y:1939,m:8,ev:"Pactul Ribbentrop-Molotov"},{y:1939,m:9,ev:"Atacul Germaniei asupra Poloniei"},{y:1940,m:6,ev:"Pierderile teritoriale România"},{y:1944,m:8,ev:"Lovitura de stat 23 august 1944"}]},
  {label:"Independența R.Moldova",items:[{y:1989,m:8,ev:"Limba română ca limbă de stat"},{y:1990,m:4,ev:"Votarea tricolorului"},{y:1990,m:6,ev:"Declarația de Suveranitate"},{y:1991,m:8,ev:"Declarația de Independență"}]},
];
function startSort(){gameMode="sort";sortSet=rnd(SORT_SETS);sortOrder=shuf([...sortSet.items]);sortChecked=false;renderSort();}
function sortMove(idx,dir){const ni=idx+dir;if(ni<0||ni>=sortOrder.length)return;[sortOrder[idx],sortOrder[ni]]=[sortOrder[ni],sortOrder[idx]];renderSort();}
function checkSort(){
  sortChecked=true;
  const sorted=[...sortSet.items].sort((a,b)=>a.y*100+a.m-(b.y*100+b.m));
  const correct=sortOrder.map(i=>i.ev).join("|")===sorted.map(i=>i.ev).join("|");
  recordAnswer(correct,"sort_"+sortSet.label,"Sistemul de la Versailles",2);renderSort();
}
function renderSort(){
  const w=pw("games");if(!w)return;
  if(sortChecked){
    const sorted=[...sortSet.items].sort((a,b)=>a.y*100+a.m-(b.y*100+b.m));
    const correct=sortOrder.map(i=>i.ev).join("|")===sorted.map(i=>i.ev).join("|");
    w.innerHTML=`<div><button class="btn btn-ghost btn-sm" style="margin-bottom:13px" onclick="backToGames()">← Înapoi</button>
    <div class="card card-${correct?"green":"red"}" style="margin-bottom:13px">
      <div style="font-size:34px;text-align:center;margin-bottom:9px">${correct?"✅":"❌"}</div>
      <div style="font-family:'Playfair Display',serif;font-size:16px;font-weight:700;text-align:center;margin-bottom:13px">${correct?"Ordinea corectă!":"Ordinea greșită. Iată ordinea corectă:"}</div>
      ${sorted.map((it,i)=>`<div style="display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid var(--border)"><span style="font-family:'DM Mono',monospace;font-size:12px;color:var(--red);min-width:18px">${i+1}</span><div><div style="font-size:13px;font-weight:600">${it.ev}</div><div style="font-size:10.5px;color:var(--ink4)">${it.y}</div></div></div>`).join("")}
    </div>
    <div style="text-align:center"><button class="btn btn-red" onclick="startSort()">Alt set</button></div></div>`;return;
  }
  w.innerHTML=`<div>
    <button class="btn btn-ghost btn-sm" style="margin-bottom:12px" onclick="backToGames()">← Înapoi</button>
    <h2 style="font-family:'Playfair Display',serif;font-size:19px;margin-bottom:3px">Ordonare cronologică</h2>
    <p style="color:var(--ink4);font-size:12.5px;margin-bottom:15px">Tema: <strong>${sortSet.label}</strong> · Folosește ↑↓ pentru a rearanja</p>
    ${sortOrder.map((it,i)=>`<div class="sort-item">
      <div style="display:flex;flex-direction:column;gap:3px">
        <button class="sort-btn" onclick="sortMove(${i},-1)" ${i===0?"disabled":""}>↑</button>
        <button class="sort-btn" onclick="sortMove(${i},1)" ${i===sortOrder.length-1?"disabled":""}>↓</button>
      </div>
      <div style="flex:1"><div style="font-size:13px;font-weight:500;color:var(--ink)">${it.ev}</div></div>
      <span class="tag t-ink" style="font-size:9px;flex-shrink:0">${it.y}</span>
    </div>`).join("")}
    <button class="btn btn-primary" style="margin-top:13px" onclick="checkSort()">✓ Verifică ordinea</button>
  </div>`;
}

function renderPomo(){
  const w=pw("pomodoro");if(!w)return;
  const total=(pomType==="work"?pomWork:pomBreak)*60;
  const left=pomPhase==="idle"?total:pomLeft;
  const prog=pomPhase==="idle"?0:Math.min(1,(total-pomLeft)/total);
  const r=75,circ=2*Math.PI*r,dash=circ*(1-prog);
  const col=pomType==="work"?"var(--red)":"var(--green)";
  const mm=String(Math.floor(left/60)).padStart(2,"0"),ss=String(left%60).padStart(2,"0");
  w.innerHTML=`
  <div class="ph"><div class="ph-eye">Productivitate</div><h1 class="ph-title">Pomodoro Timer</h1><p class="ph-desc">Studiu focalizat · ${pomSessions} sesiuni completate</p></div>
  <div style="max-width:360px;margin:0 auto">
    <div style="display:flex;gap:8px;justify-content:center;margin-bottom:18px">
      <button class="btn ${pomType==="work"?"btn-red":"btn-outline"} btn-sm" onclick="setPomoType('work')">📖 Studiu (${pomWork}min)</button>
      <button class="btn ${pomType==="break"?"btn-green":"btn-outline"} btn-sm" onclick="setPomoType('break')">☕ Pauză (${pomBreak}min)</button>
    </div>
    <div class="pomo-ring">
      <svg class="pomo-svg" width="170" height="170" viewBox="0 0 170 170">
        <circle class="pomo-track" cx="85" cy="85" r="${r}"/>
        <circle class="pomo-prog" cx="85" cy="85" r="${r}" stroke="${col}" stroke-dasharray="${circ}" stroke-dashoffset="${dash}"/>
      </svg>
      <div class="pomo-time"><div class="pomo-t" style="color:${col}">${mm}:${ss}</div><div class="pomo-lbl">${pomPhase==="idle"?"Pregătit":pomPhase==="running"?"În curs":pomPhase==="paused"?"Pauza":"Gata!"}</div></div>
    </div>
    <div style="display:flex;gap:9px;justify-content:center;margin-top:16px">
      ${pomPhase==="idle"?`<button class="btn btn-red btn-lg" onclick="startPomo()">▶ Start</button>`:""}
      ${pomPhase==="running"?`<button class="btn btn-outline" onclick="pausePomo()">⏸ Pauză</button><button class="btn btn-outline btn-sm" onclick="stopPomo()">■ Stop</button>`:""}
      ${pomPhase==="paused"?`<button class="btn btn-red" onclick="resumePomo()">▶ Continuă</button><button class="btn btn-outline btn-sm" onclick="stopPomo()">■ Stop</button>`:""}
      ${pomPhase==="done"?`<button class="btn btn-primary" onclick="stopPomo()">✓ OK</button>`:""}
    </div>
    <div class="divider"></div>
    <div class="card">
      <div class="sec-t">Setări timer</div>
      <div class="g2">
        <div><div style="font-size:10.5px;color:var(--ink4);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px;font-weight:600">Studiu (min)</div><input type="number" class="inp" value="${pomWork}" min="1" max="60" style="text-align:center;font-family:'DM Mono',monospace" onchange="pomWork=parseInt(this.value)||25;if(pomPhase==='idle')renderPomo()"></div>
        <div><div style="font-size:10.5px;color:var(--ink4);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px;font-weight:600">Pauză (min)</div><input type="number" class="inp" value="${pomBreak}" min="1" max="30" style="text-align:center;font-family:'DM Mono',monospace" onchange="pomBreak=parseInt(this.value)||5;if(pomPhase==='idle')renderPomo()"></div>
      </div>
    </div>
  </div>`;
}
function setPomoType(t){if(pomPhase!=="running"){pomType=t;pomPhase="idle";renderPomo();}}
function startPomo(){pomLeft=(pomType==="work"?pomWork:pomBreak)*60;pomPhase="running";clearInterval(pomIv);
pomIv=setInterval(()=>{
  pomLeft--;
  mtUpdateDisplay();
  if(pomLeft<=0){
    clearInterval(pomIv);pomPhase="done";pomSessions++;
    P.pomoDone=(P.pomoDone||0)+1;save();checkAchs();
    toast("🍅 Sesiune Pomodoro completă!","green");
    mtAlarm();
    if(el('mt-ico'))el('mt-ico').textContent='🍅';
    if(el('mini-timer'))el('mini-timer').style.borderColor='var(--red)';
  }
  if(CP==='pomodoro')renderPomo();
},1000);
mtUpdateDisplay();}
function pausePomo(){clearInterval(pomIv);pomPhase="paused";mtUpdateDisplay();renderPomo();}
function resumePomo(){pomPhase="running";pomIv=setInterval(()=>{
  pomLeft--;mtUpdateDisplay();
  if(pomLeft<=0){clearInterval(pomIv);pomPhase="done";pomSessions++;P.pomoDone=(P.pomoDone||0)+1;save();mtAlarm();toast("🍅 Gata!","green");}
  if(CP==='pomodoro')renderPomo();
},1000);mtUpdateDisplay();}
function stopPomo(){clearInterval(pomIv);pomPhase="idle";if(el("mini-timer"))el("mini-timer").style.borderColor="var(--border)";mtUpdateDisplay();renderPomo();}

//  MINI TIMER
// ═══════════════════════════════════════
let mtTotal=0,mtLeft=0,mtRunning=false,mtIv=null;

function mtOpen(){
  const m=el('mt-modal');if(m){m.style.display='flex';}
}
function mtCloseModal(){
  const m=el('mt-modal');if(m)m.style.display='none';
}
function mtSet(mins){
  mtTotal=mins*60;mtLeft=mins*60;mtRunning=false;
  clearInterval(mtIv);mtUpdateDisplay();mtCloseModal();
  el('mt-btn').textContent='▶';
  el('mt-ico').textContent='⏱️';
  el('mini-timer').style.borderColor='var(--border)';
}
function mtSetCustom(){
  const v=parseInt(el('mt-custom')?.value)||0;
  if(v>0&&v<=300)mtSet(v);
}
function mtReset(){mtSet(0);mtCloseModal();}
function mtToggle(){
  // If Pomodoro is running, clicking toggles pomo pause/resume
  if(typeof pomPhase!=='undefined'&&(pomPhase==='running'||pomPhase==='paused')){
    if(pomPhase==='running')pausePomo();
    else resumePomo();
    return;
  }
  if(!mtTotal)return mtOpen();
  if(mtLeft<=0)return mtSet(mtTotal/60);
  mtRunning=!mtRunning;
  el('mt-btn').textContent=mtRunning?'⏸':'▶';
  if(mtRunning){
    mtIv=setInterval(()=>{
      mtLeft--;
      mtUpdateDisplay();
      if(mtLeft<=0){
        clearInterval(mtIv);mtRunning=false;
        el('mt-btn').textContent='▶';
        el('mt-ico').textContent='🔔';
        el('mini-timer').style.borderColor='var(--red)';
        mtAlarm();
        toast('⏰ Timerul s-a terminat!','gold');
      }
    },1000);
  } else {
    clearInterval(mtIv);
  }
}
function mtUpdateDisplay(){
  // Show Pomodoro state if it's running, otherwise show mini timer
  let displayLeft, displayTotal, isPomo=false;
  if(typeof pomPhase!=='undefined'&&pomPhase==='running'&&typeof pomLeft!=='undefined'){
    displayLeft=pomLeft;
    displayTotal=(pomType==='work'?pomWork:pomBreak)*60;
    isPomo=true;
  } else if(typeof pomPhase!=='undefined'&&pomPhase==='paused'&&typeof pomLeft!=='undefined'){
    displayLeft=pomLeft;
    displayTotal=(pomType==='work'?pomWork:pomBreak)*60;
    isPomo=true;
  } else {
    displayLeft=mtLeft;
    displayTotal=mtTotal;
  }
  const m=Math.floor(displayLeft/60),s=displayLeft%60;
  const txt=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  const d=el('mt-display');if(d){
    d.textContent=txt;
    if(displayLeft<=60&&displayLeft>0){d.style.color='var(--red)';}
    else if(displayLeft<=300&&displayLeft>0){d.style.color='var(--gold)';}
    else{d.style.color='var(--ink)';}
  }
  const ico=el('mt-ico');if(ico){
    if(isPomo){
      ico.textContent=pomType==='work'?'📖':'☕';
    } else if(mtLeft<=0&&mtTotal>0){
      ico.textContent='🔔';
    } else {
      ico.textContent='⏱️';
    }
  }
  const btn=el('mt-btn');if(btn&&!isPomo){
    btn.textContent=mtRunning?'⏸':'▶';
  }
}
function mtAlarm(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [0,0.3,0.6,0.9,1.2].forEach(t=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.type='sine';o.frequency.setValueAtTime(880,ctx.currentTime+t);
      o.frequency.setValueAtTime(660,ctx.currentTime+t+0.15);
      g.gain.setValueAtTime(0.12,ctx.currentTime+t);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+t+0.28);
      o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+0.3);
    });
  }catch(e){}
}

function toggleChat(){
  chatOpen=!chatOpen;
  el("chat-win").classList.toggle("open",chatOpen);
  if(chatOpen&&chatHistory.length===0)addChatMsg("ai","Salut! 👋 Sunt tutorele AI pentru Istoria IX.\n\nÎntreabă orice despre termeni, date, cauze, consecințe sau personalități din programa de examen.");
}
function addChatMsg(role,text){
  chatHistory.push({role,text});
  const wrap=el("ch-msgs"),m=document.createElement("div");m.className="ch-msg "+role;m.innerHTML=text.replace(/\n/g,"<br>");
  wrap.appendChild(m);wrap.scrollTop=wrap.scrollHeight;
}
function chatKey(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendChat();}}
async function sendChat(){
  const inp=el("ch-inp"),msg=inp.value.trim();if(!msg)return;inp.value="";addChatMsg("user",msg);
  const btn=el("ch-send");btn.disabled=true;
  const tid="cm"+Date.now();const wrap=el("ch-msgs");
  const t=document.createElement("div");t.className="ch-msg ai";t.id=tid;t.innerHTML='<span class="spin"></span>';
  wrap.appendChild(t);wrap.scrollTop=wrap.scrollHeight;
  const sys="Ești tutore de Istorie pentru clasa a IX-a din Moldova/România. Materia: PRM, Versailles, România Interbelică, Basarabia, WWII, Lumea Postbelică, RSSM, Independența R.Moldova, Criza 1929-1933, Regimuri Totalitare, Cultură și Știință. Răspunde în română, clar, cu date concrete.";
  const msgs=chatHistory.filter(m=>!m.text.includes("spin")).slice(-12).map(m=>({role:m.role==="ai"?"assistant":"user",content:m.text.replace(/<[^>]+>/g,"")}));
  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:900,system:sys,messages:msgs})});
    if(!r.ok)throw new Error("HTTP "+r.status);
    const d=await r.json();
    el(tid)?.remove();addChatMsg("ai",d.content.map(c=>c.text||"").join(""));
  }catch(e){el(tid)?.remove();addChatMsg("ai","❌ Eroare: "+e.message+"\n\nAI funcționează nativ în claude.ai.");}
  btn.disabled=false;
}

  if(e.key==="Escape"){
    closeSearch();

    document.getElementById("ev-ov")?.remove();

});
